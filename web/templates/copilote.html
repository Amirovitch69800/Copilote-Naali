let _tourActive = false;
let _tourStep   = 0;

function startTour() {
  document.getElementById('welcomeModal')?.remove();
  _tourActive = true;
  _tourStep   = 0;
  document.body.classList.add('tour-active');
  _tourGoTo(0);
}

function _tourGoTo(idx) {
  _tourStep = idx;
  navigate(TOUR[idx].id);
  _tourBarRender();
}

function _tourBarRender() {
  const bar = document.getElementById('tourBar');
  if(!bar) return;
  if(!_tourActive) { bar.className = ''; return; }
  const step  = TOUR[_tourStep];
  const total = TOUR.length;
  bar.className = 'tour-bar-visible';
  bar.innerHTML = `
    <div class="tour-bar-left">
      <div class="tour-dots">
        ${TOUR.map((_,i) => `<span class="tour-dot${i===_tourStep?' active':''}"></span>`).join('')}
      </div>
      <div class="tour-bar-info">
        <div class="tour-bar-step">Étape ${_tourStep+1} / ${total}</div>
        <div class="tour-bar-title">${step.icon} ${step.title}</div>
      </div>
    </div>
    <div class="tour-bar-actions">
      <button class="btn btn-outline btn-sm" onclick="_tourPrev()" ${_tourStep===0?'disabled':''}>← Préc.</button>
      ${_tourStep < total-1
        ? `<button class="btn btn-primary btn-sm" onclick="_tourNext()">Suivant →</button>`
        : `<button class="btn btn-primary btn-sm" onclick="_tourEnd()">Terminer ✓</button>`}
      <button class="tour-bar-close" onclick="_tourEnd()" title="Quitter le guide">✕</button>
    </div>`;
}

function _tourNext() { if(_tourActive && _tourStep < TOUR.length-1) _tourGoTo(_tourStep+1); }
function _tourPrev() { if(_tourActive && _tourStep > 0) _tourGoTo(_tourStep-1); }
function _tourEnd() {
  _tourActive = false;
  document.body.classList.remove('tour-active');
  document.getElementById('tourBar').className = '';
  document.querySelector('.demo-section-banner')?.remove();
  localStorage.setItem('naali_demo_seen','1');
}

function _sectionBannerHtml(id) {
  if(!_tourActive) return '';
  const idx  = TOUR.findIndex(t => t.id === id);
  if(idx < 0) return '';
  const step = TOUR[idx];
  return `<div class="demo-section-banner">
    <div class="dsb-icon">${step.icon}</div>
    <div class="dsb-body">
      <div class="dsb-step-label">Étape ${idx+1} sur ${TOUR.length}</div>
      <div class="dsb-title">${step.title}</div>
      <div class="dsb-desc">${step.body}</div>
      <div class="dsb-tags">
        ${step.tags.map(t=>`<span class="dsb-tag">${t}</span>`).join('')}
        <span class="dsb-tag dsb-tag-demo">💡 Données fictives</span>
      </div>
    </div>
  </div>`;
}

const NAV = [

  { id:'agenda',       label:'Agenda',      icon:icons.calendar, badge:null },

function renderNav(badges={}) {
  document.getElementById('mainNav').innerHTML = NAV.map(n => `
    <button class="nav-btn ${S.active===n.id?'active':''}" onclick="navigate('${n.id}')">
      ${n.icon}
      <span>${n.label}</span>
      ${badges[n.id] ? `<span class="nav-badge">${badges[n.id]}</span>` : ''}

// ══════════════════════════════════════
// ROUTER
// ══════════════════════════════════════
function navigate(id, params={}) {
  _navGen++;           // invalide tous les renders async en cours
  S.active = id;
  renderNav(S.badges);
  const titles = {
    today:"Aujourd'hui", agenda:'Agenda', planificateur:'Planificateur',
    brief_search:'Brief visite',
    visiter:'Visiter', brief:'Brief visite', post_visite:'Post-visite', cr:'Compte-rendu',
    commandes:'Commandes', offres:'Offres',
    objectifs:'Objectifs', portefeuille:'Objectifs',
    performance:'Performance',
    sync:'Synchronisation',
  };
  document.getElementById('topbarTitle').textContent = titles[id] || id;

  const fn = {
    today:         renderToday,
    agenda:        renderAgenda,
    planificateur: renderPlanificateur,
    visiter:       () => renderVisiter(params),
    brief_search:  () => renderBriefSearch(),
    brief:         () => renderBrief(params.meetingId, params.companyId),
    post_visite:   renderPostVisite,
    cr:            () => renderCR(params),
    commandes:     () => renderCommandes(params),
    offres:        renderOffres,
    objectifs:     renderObjectifs,
    portefeuille:  renderPortefeuille,
    performance:   renderPerformance,
    sync:          renderSyncPage,
  }[id];
  if(fn) fn();
}


// helper : charge la data d'un module (depuis cache ou API)
// gen = _navGen capturé au moment où le render a démarré
async function loadModule(id, url, gen) {
  if(S.cache[id]) return S.cache[id];
  setContent(skeletonCards(3), gen);
  const d = await api(url);
  if(gen !== undefined && gen !== _navGen) throw new Error('stale');
  S.cache[id] = d;
  return d;
}

// Bouton Actualiser : vide le cache du module actif et recharge
async function syncHubspot(btn) {
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Sync…';
  try {
    await fetch('/api/cache/refresh', {method:'POST'});
    Object.keys(S.cache).forEach(k => delete S.cache[k]);
    refreshCurrent();
  } catch(e) { console.error(e); }
  btn.disabled = false;
  btn.innerHTML = orig;
}

function refreshCurrent() {
  const id = S.active;
  delete S.cache[id];
  if(id === 'agenda') {
    Object.keys(S.cache).forEach(k => { if(k.startsWith('agenda_')) delete S.cache[k]; });
  }
  if(id === 'portefeuille' || id === 'objectifs') { _pf.data = null; }
  if(id === 'offres')       { _offresData = null; }
  if(id === 'planificateur' || id === 'agenda'){ _planifState.data = null; }
  if(id === 'visiter')      { delete S.cache['today']; delete S.cache['post_visite']; }
  navigate(id);
}

let _toastTimer = null;
function showToast(msg, type = 'success', duration = 3500) {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  if(_toastTimer) clearTimeout(_toastTimer);
  const icons = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
    error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    warn:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    info:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  };
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = (icons[type] || '') + `<span>${msg}</span>`;
  document.body.appendChild(t);
  _toastTimer = setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 200);
  }, duration);
}

function skeletonCards(n = 3) {
  return Array.from({length: n}, () => `
    <div class="sk-card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div class="sk" style="width:38px;height:38px;border-radius:10px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="sk sk-h" style="width:55%;margin-bottom:6px"></div>
          <div class="sk sk-h-sm" style="width:35%"></div>
        </div>
      </div>
      <div class="sk sk-h-sm" style="width:100%;margin-bottom:5px"></div>
      <div class="sk sk-h-sm" style="width:80%"></div>
    </div>`).join('');
}

// ══════════════════════════════════════
// API
// ══════════════════════════════════════
async function api(url, opts={}) {
  try {
    const r = await fetch(url, { headers:{'Content-Type':'application/json'}, ...opts });
    if(!r.ok) throw new Error(r.status);
    return r.json();
  } catch(e) {
    console.error('[api]', url, e);
    throw e;
  }
}

// ── File d'attente hors-ligne ───────────────────────────────────────────────
const QUEUE_KEY = 'naali_pending_cr';

function queueGet() {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch { return []; }
}
function queueSave(items) {
  localStorage.setItem(QUEUE_KEY, JSON.stringify(items));
}
function queueAdd(item) {
  const q = queueGet();
  item._id  = Date.now() + Math.random().toString(36).slice(2);
  item._at  = new Date().toISOString();
  q.push(item);
  queueSave(q);
  _updateSyncBadge();
}
function queueRemove(id) {
  queueSave(queueGet().filter(i => i._id !== id));
  _updateSyncBadge();
}
function _updateSyncBadge() {
  const n = queueGet().length;
  S.badges['sync'] = n || null;
  renderNav(S.badges);
  const el = document.getElementById('syncFooterCount');
  if(el) el.textContent = n ? `${n} en attente` : 'Sync';
}

function fmtEur(v) {
  if(!v && v!==0) return '—';
  return Number(v).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
}

// Compteur de navigation : chaque navigate() l'incrémente.
// setContent() refuse d'écrire si le compteur a changé depuis que
// le render a démarré — évite qu'un render async périmé écrase le bon contenu.
let _navGen = 0;

function setContent(html, gen) {
  if(gen !== undefined && gen !== _navGen) return;
  const pf = document.getElementById('perfFrame');
  if(pf) { pf.style.display = 'none'; pf.style.flex = ''; }
  const c = document.getElementById('content');
  c.style.display  = '';
  c.style.flex     = '';
  c.style.padding  = '';
  c.style.overflow = '';
  c.innerHTML      = _sectionBannerHtml(S.active) + html;
}

// INIT — sidebar uniquement

async function initApp() {
  // Date topbar
  const today = new Date();
  const opts = {weekday:'long',day:'numeric',month:'long',year:'numeric'};
  const s = today.toLocaleDateString('fr-FR',opts);
  document.getElementById('topbarDate').textContent = s.charAt(0).toUpperCase()+s.slice(1);

  // Sync status
  document.getElementById('syncDot').className = 'sync-dot';
  document.getElementById('syncLabel').textContent = navigator.onLine ? 'Connecté' : 'Hors connexion';
  if(!navigator.onLine) document.getElementById('syncDot').classList.add('amber');

  // Sidebar KPIs (léger)
  try {
    const d = await api('/api/kpis');
    S.hub_id = d.hub_id || '';
    const name = d.owner_name || 'Commercial';
    document.getElementById('avatarInitials').textContent = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('profileName').textContent = name;
    document.getElementById('profileZone').textContent = d.territoire || '';
    document.getElementById('statClients').textContent = d.nb_clients ?? '—';
    document.getElementById('statProspects').textContent = d.nb_prospects ?? '—';

    // CA mois R/O
    const mois = d.mois_label || '—';
    const caR  = d.ca_mois || 0;
    const caO  = d.objectif_ca || 0;
    const caPct  = caO ? Math.min(100, Math.round(caR / caO * 100)) : 0;
    const caRest = caO ? Math.max(0, caO - caR) : 0;
    document.getElementById('caMoisLabel').textContent = `CA ${mois}`;
    document.getElementById('caMoisRO').textContent = caO ? `${fmtEur(caR)} / ${fmtEur(caO)}` : fmtEur(caR);
    document.getElementById('caMoisBar').style.width = caPct + '%';
    document.getElementById('caMoisMeta').textContent = caO
      ? `${caPct}% réalisé · ${fmtEur(caRest)} restants`
      : '';

    // Implantations R/O
    const implR   = d.nb_implant ?? 0;
    const implO   = d.objectif_implant || 0;
    const implPct  = implO ? Math.min(100, Math.round(implR / implO * 100)) : 0;
    const implRest = implO ? Math.max(0, implO - implR) : 0;
    document.getElementById('implantLabel').textContent = `Implantations ${mois}`;
    document.getElementById('implantRO').textContent = implO ? `${implR} / ${implO}` : implR;
    document.getElementById('implantBar').style.width = implPct + '%';
    document.getElementById('implantMeta').textContent = implO
      ? `${implPct}% réalisé · ${implRest} restante${implRest > 1 ? 's' : ''}`
      : '';
  } catch(e) {}

  _updateSyncBadge();
  navigate('today');
}

async function renderToday() {
  const _gen = _navGen;
  try {
    const d = await loadModule('today', '/api/today', _gen);
    const meetings = d.today_meetings || [];
    const crManquants = d.cr_manquants || [];
    const pts = d.points_used ?? 0;
    const ptsMax = d.points_max ?? 10;
    const pct = ptsMax > 0 ? Math.round(pts / ptsMax * 100) : 0;
    const pendingSync = queueGet().length;

    // badges nav
    S.badges = {};
    if(crManquants.length) S.badges['visiter'] = crManquants.length;
    renderNav(S.badges);

    // ── Header : date + progress bar ──────────────────────────────────────
    const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const today = new Date();
    const jourLabel = jours[today.getDay()];
    const dateLabel = today.toLocaleDateString('fr-FR', { day:'numeric', month:'long' });
    const nbV = meetings.length;

    const headerHtml = `
      <div style="margin-bottom:16px">
        <div class="row-sb" style="margin-bottom:10px;align-items:flex-end">
          <div>
            <div style="font-size:20px;font-weight:700">${jourLabel} ${dateLabel}</div>
            <div class="muted" style="font-size:13px;margin-top:2px">${nbV ? `${nbV} visite${nbV>1?'s':''} planifiée${nbV>1?'s':''}` : 'Aucun rendez-vous'}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:18px;font-weight:700">${pts}<span class="muted" style="font-size:13px;font-weight:400"> / ${ptsMax} pts</span></div>
            <div class="muted" style="font-size:11px">${pct}% de l'objectif</div>
          </div>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${Math.min(pct,100)}%"></div></div>
      </div>`;

    // ── Liste des RDVs ────────────────────────────────────────────────────
    const meetingsHtml = nbV ? `
      <div class="card" style="margin-bottom:16px">
        <div class="card-body" style="padding:0">
          ${meetings.map((m, i) => {
            const type    = (m.type||'').toUpperCase();
            const btype   = ['VC','RC','F'].includes(type) ? 'bvc' : 'bvp';
            const done    = (m.outcome||'') === 'COMPLETED';
            const canceled = ['CANCELED','CANCELLED'].includes((m.outcome||'').toUpperCase());
            return `<div style="display:flex;align-items:center;gap:10px;padding:13px 16px;${i>0?'border-top:1px solid var(--border)':''}${done||canceled?';opacity:.5':''}">
              <span class="badge bdark" style="min-width:44px;justify-content:center;flex-shrink:0;font-variant-numeric:tabular-nums">${m.heure||'–'}</span>
              <span class="badge ${btype}" style="flex-shrink:0">${type}</span>
              <div style="flex:1;min-width:0">
                <div class="fw6" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.company_nom||m.titre||'–'}</div>
                ${done?'<div class="muted" style="font-size:10px;margin-top:1px">Terminé</div>':canceled?'<div class="muted" style="font-size:10px;margin-top:1px">Annulé</div>':''}
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0">
                <button class="btn btn-primary btn-sm" onclick="navigate('brief',{meetingId:'${m.id}'})">Brief</button>
                <button class="btn btn-outline btn-sm" onclick="navigate('cr',{meetingId:'${m.id}',companyId:'${m.company_id||''}',companyNom:'${(m.company_nom||m.titre||'').replace(/'/g,"\\'")}',meetingType:'${(m.type||'').toUpperCase()}'})">${done&&m.has_note?'✓ CR':'CR'}</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`
    : `<div class="card" style="margin-bottom:16px">
        <div class="card-body" style="text-align:center;padding:24px 16px">
          <div class="muted" style="margin-bottom:12px">Aucun rendez-vous planifié aujourd'hui</div>
          <button class="btn btn-outline" onclick="navigate('agenda')">Ouvrir l'agenda →</button>
        </div>
      </div>`;

    // ── Urgences (CR + sync + commandes) ──────────────────────────────────
    const urgences = [];
    if(crManquants.length) urgences.push({
      label: String(crManquants.length),
      sub: `CR en attente`,
      color: '#e74c3c',
      fn: `navigate('visiter')`,
    });
    if(d.commandes_brouillons) urgences.push({
      label: String(d.commandes_brouillons),
      sub: `commande${d.commandes_brouillons>1?'s':''} brouillon`,
      color: '#e67e22',
      fn: `navigate('commandes')`,
    });
    if(pendingSync) urgences.push({
      label: String(pendingSync),
      sub: `élément${pendingSync>1?'s':''} à sync`,
      color: '#2980b9',
      fn: `navigate('sync')`,
    });

    const urgencesHtml = urgences.length ? `
      <div style="display:grid;grid-template-columns:repeat(${Math.min(urgences.length,3)},1fr);gap:10px;margin-bottom:16px">
        ${urgences.map(u=>`
          <div class="card" style="cursor:pointer;border-left:3px solid ${u.color}" onclick="${u.fn}">
            <div class="card-body" style="padding:12px 14px">
              <div style="font-size:22px;font-weight:700;color:${u.color};line-height:1">${u.label}</div>
              <div class="muted" style="font-size:11px;margin-top:4px">${u.sub}</div>
            </div>
          </div>`).join('')}
      </div>` : '';

    setContent(headerHtml + meetingsHtml + urgencesHtml, _gen);

  } catch(e) {
    if(e?.message === 'stale') return;
    setContent('<div class="empty">Erreur chargement — vérifiez la connexion</div>');
  }
}

const JOBTITLE_OPTS = ['Pharmacien titulaire','Pharmacien adjoint','Responsable achats','Préparateur','Conseiller','Autre'];

async function _briefContactsLoad(cid) {
  if(!cid) return;
  const el = document.getElementById('briefContactsList');
  if(!el) return;
  try {
    const d = await api(`/api/contacts/${cid}`);
    _briefContactsRender(cid, d.contacts || []);
  } catch(e) {
    if(el) el.innerHTML = '<div class="muted small">Erreur chargement contacts</div>';
  }
}

function _briefContactsRender(cid, contacts) {
  const el = document.getElementById('briefContactsList');
  if(!el) return;
  if(!contacts.length) {
    el.innerHTML = '<div class="muted small" style="padding:4px 0">Aucun contact — cliquez sur "+ Ajouter"</div>';
    return;
  }
  el.innerHTML = contacts.map(c => `
    <div class="brief-contact-row" data-cid="${c.id}" style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${[c.firstname,c.lastname].filter(Boolean).join(' ')||'–'}</div>
        <div class="muted" style="font-size:11px;margin-top:1px">${c.jobtitle||''}</div>
        ${c.email?`<div class="muted" style="font-size:11px">${c.email}</div>`:''}
        ${c.phone?`<a href="tel:${c.phone}" class="muted" style="font-size:11px;color:var(--accent)">${c.phone}</a>`:''}
      </div>
      <button class="btn btn-ghost btn-sm" onclick="_briefContactEdit('${cid}',${JSON.stringify(c).replace(/'/g,"&#39;")})">Modifier</button>
    </div>`).join('');
}

function _briefContactAdd(cid) {
  _briefContactModal(cid, null);
}

function _briefContactEdit(cid, contact) {
  _briefContactModal(cid, contact);
}

function _briefContactModal(cid, contact) {
  const isEdit = !!contact;
  const c = contact || {};
  const IS = 'width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text);outline:none;box-sizing:border-box;margin-bottom:8px';

  const overlay = document.createElement('div');
  overlay.id = 'briefContactOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML = `
    <div style="background:var(--surface);border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.3)">
      <div style="font-size:16px;font-weight:700;margin-bottom:18px">${isEdit?'Modifier le contact':'Nouveau contact HubSpot'}</div>
      <input id="bcFirstname" type="text" placeholder="Prénom" value="${c.firstname||''}" style="${IS}">
      <input id="bcLastname"  type="text" placeholder="Nom"    value="${c.lastname||''}"  style="${IS}">
      <select id="bcJobtitle" style="${IS}">
        <option value="">Fonction…</option>
        ${JOBTITLE_OPTS.map(o=>`<option value="${o}" ${c.jobtitle===o?'selected':''}>${o}</option>`).join('')}
      </select>
      <input id="bcPhone" type="tel"   placeholder="Téléphone" value="${c.phone||''}"  style="${IS}">
      <input id="bcEmail" type="email" placeholder="Email"     value="${c.email||''}"  style="${IS}">
      <div id="bcError" style="color:#e74c3c;font-size:12px;margin-bottom:8px;display:none"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px">
        <button class="btn btn-ghost" onclick="document.getElementById('briefContactOverlay')?.remove()">Annuler</button>
        <button id="bcSaveBtn" class="btn btn-primary" onclick="_briefContactSave('${cid}','${c.id||''}')">
          ${isEdit?'Enregistrer':'Créer dans HubSpot'}
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  setTimeout(() => document.getElementById('bcFirstname')?.focus(), 50);
}

async function _briefContactSave(cid, contactId) {
  const btn = document.getElementById('bcSaveBtn');
  const err = document.getElementById('bcError');
  const data = {
    firstname: document.getElementById('bcFirstname')?.value?.trim() || '',
    lastname:  document.getElementById('bcLastname')?.value?.trim()  || '',
    jobtitle:  document.getElementById('bcJobtitle')?.value          || '',
    phone:     document.getElementById('bcPhone')?.value?.trim()     || '',
    email:     document.getElementById('bcEmail')?.value?.trim()     || '',
  };
  if(!data.firstname && !data.lastname) {
    if(err) { err.textContent='Prénom ou nom requis'; err.style.display='block'; }
    return;
  }
  if(btn) { btn.disabled=true; btn.textContent='Envoi…'; }
  try {
    const url = contactId ? `/api/contacts/update/${contactId}` : `/api/contacts/${cid}`;
    const res = await api(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    if(res.error) throw new Error(res.error);
    document.getElementById('briefContactOverlay')?.remove();
    _briefContactsLoad(cid);
  } catch(e) {
    if(err) { err.textContent = e.message||'Erreur'; err.style.display='block'; }
    if(btn) { btn.disabled=false; btn.textContent=contactId?'Enregistrer':'Créer dans HubSpot'; }
  }
}

function _briefLoad(cid) {
  try { return JSON.parse(localStorage.getItem('naali_brief_' + cid) || '{}'); } catch(e) { return {}; }
}
function _briefSave(cid, key, val) {
  if(!cid) return;
  try { const d = _briefLoad(cid); d[key] = val; localStorage.setItem('naali_brief_' + cid, JSON.stringify(d)); } catch(e) {}
}

let _briefSearchTimer = null;
async function _briefSearchInput(q) {
  clearTimeout(_briefSearchTimer);
  const el = document.getElementById('briefSearchResults');
  if(!el) return;
  if(q.trim().length < 2) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="muted small" style="padding:8px 0">Recherche…</div>`;
  _briefSearchTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/pharmacies/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      const items = (data.results || []).slice(0, 10);
      if(!items.length) { el.innerHTML = '<div class="muted small" style="padding:8px 0">Aucun résultat</div>'; return; }
      el.innerHTML = items.map(p => `
        <div class="meeting-item" style="cursor:pointer" onclick="navigate('brief',{companyId:'${p.id_hubspot}',companyNom:'${(p.nom||'').replace(/'/g,"\\'")}' })">
          <div style="flex:1;min-width:0">
            <div class="fw6 small">${p.nom}</div>
            <div class="muted" style="font-size:11px">${p.ville||''} ${p.cp?'· '+p.cp:''}</div>
          </div>
          <span class="badge ${p.is_client?'bgreen':'boutline'}" style="flex-shrink:0;font-size:10px">${p.is_client?'Client':'Prospect'}</span>
        </div>`).join('');
    } catch(e) { el.innerHTML = '<div class="muted small" style="padding:8px 0">Erreur de recherche</div>'; }
  }, 300);
}

async function renderBrief(meetingId, companyId) {
  // Chargement via company directement (depuis Brief Search)
  if(!meetingId && companyId) {
    setContent(`<div style="padding:32px;text-align:center;color:var(--text-muted)">Chargement…</div>`);
    try {
      const d = await fetch(`/api/brief/company/${companyId}`).then(r=>r.json());
      _renderBriefContent(d);
    } catch(e) { setContent('<div class="empty">Erreur chargement</div>'); }
    return;
  }

  if(!meetingId) {
    // Proposer de choisir un meeting du jour
    try {
      const td = S.cache['today'] || await api('/api/today');
      const meetings = (td.today_meetings||[]).filter(m => (m.outcome||'SCHEDULED')==='SCHEDULED');
      if(!meetings.length) { setContent('<div class="empty">Aucun rendez-vous planifié pour aujourd\'hui</div>'); return; }
      setContent(`<div class="card" style="max-width:600px">
        <div class="card-header" style="padding-bottom:14px"><div class="card-title">Choisir un rendez-vous</div></div>
        <div class="card-body">
          ${meetings.map(m=>`
            <div class="meeting-item" style="cursor:pointer" onclick="navigate('brief',{meetingId:'${m.id}'})">
              <div class="meeting-badges">
                <span class="badge bdark">${m.heure}</span>
                <span class="badge ${['VC','RC','F'].includes((m.type||'').toUpperCase())?'bvc':'bvp'}">${m.type}</span>
              </div>
              <div class="meeting-name">${m.company_nom||m.titre||'–'}</div>
            </div>`).join('')}
        </div>
      </div>`);
    } catch(e) { setContent('<div class="empty">Erreur chargement</div>'); }
    return;
  }

  try {
    const d = await api(`/api/brief/${meetingId}`);
    _renderBriefContent(d);
  } catch(e) {
    console.error(e);
    setContent('<div class="empty">Erreur chargement du brief</div>');
  }
}

function _renderBriefContent(d) {
  const dn = d.dn || {};
    const pharma = d.company || {};
    const lastDeal = d.last_deal || {};
    const note = d.last_note || {};
    const notesList = d.notes_list || [];
    const cid = pharma.id || '';
    const loc = cid ? _briefLoad(cid) : {};

    // ── CA par année depuis deals ──────────────────────────────────────────
    function caByYear(year) {
      return (d.deals||[]).filter(dl=>(dl.closedate||'').startsWith(String(year))).reduce((s,dl)=>s+(dl.montant||0),0);
    }
    const ca2025 = caByYear(2025);
    const ca2026 = caByYear(2026);

    // ── Pack ──────────────────────────────────────────────────────────────
    const _PACK_MAP = {
      'découverte': { label:'Pack Découverte', detail:'3 refs · 24u · 30% · coef 1,51', color:'#27ae60', ug:'–' },
      'decouverte': { label:'Pack Découverte', detail:'3 refs · 24u · 30% · coef 1,51', color:'#27ae60', ug:'–' },
      'démarrage':  { label:'Pack Démarrage',  detail:'5 refs · 48u · 35% · coef 1,62 · meuble sol', color:'#2980b9', ug:'–' },
      'demarrage':  { label:'Pack Démarrage',  detail:'5 refs · 48u · 35% · coef 1,62 · meuble sol', color:'#2980b9', ug:'–' },
      'partenaire': { label:'Pack Partenaire', detail:'8 refs · 84u · 35% · coef 1,76 · meuble sol', color:'#8e44ad', ug:'12+1' },
      'ambassadeur':{ label:'Pack Ambassadeur',detail:'12 refs · 108u · 35% · coef 1,89 · meuble sol', color:'#e67e22', ug:'12+2' },
    };
    const lsRaw = (d.lead_status||'').toLowerCase();
    const packInfo = Object.entries(_PACK_MAP).find(([k])=>lsRaw.includes(k))?.[1] || null;

    // ── Calculs ───────────────────────────────────────────────────────────
    const isClient = ['true','rétrocession','retrocession','1','oui','yes'].includes((pharma.client_naali||'').toLowerCase().trim());
    const dnPct = dn.pct || 0;
    const dnCls = dnPct >= 80 ? 'bgreen' : dnPct >= 40 ? 'bamber' : 'bred';
    const lastDealDays = (() => {
      if(!lastDeal.closedate) return null;
      return Math.floor((Date.now() - new Date(lastDeal.closedate).getTime()) / 86400000);
    })();
    const segMap = {'Prioritaires':'P','Secondaires':'S','Non Prioritaires':'NP'};
    const seg = segMap[pharma.potentiel] || '–';

    // Objectifs
    let objPrincipal, objSecondaire, objResultat;
    if(!isClient) {
      objPrincipal='Qualifier le besoin'; objSecondaire='Présenter la gamme Naali'; objResultat='Obtenir un premier référencement';
    } else if(dnPct < 40) {
      objPrincipal='Développer la DN'; objSecondaire=`Référencer les manquants (${(dn.manquants||[]).slice(0,2).join(', ')||'voir gamme'})`; objResultat='Commande avec nouveaux produits';
    } else if(dnPct < 80) {
      objPrincipal='Consolider la présence'; objSecondaire='Réassort + nouveautés saison'; objResultat='Commande de réassort validée';
    } else {
      objPrincipal='Fidéliser et développer'; objSecondaire='Sellout + formation équipe'; objResultat='Commande + plan sellout';
    }

    // Prochaine meilleure action
    let pbaCta, pbaCtaFn;
    if(!isClient || (lastDealDays !== null && lastDealDays > 60) || dnPct < 40) {
      pbaCta='Créer une commande'; pbaCtaFn=`navigate('commandes',{companyId:'${cid}',companyNom:'${(pharma.nom||'').replace(/'/g,"\\'")}' })`;

/** Retourne la date locale (Paris) au format YYYY-MM-DD — évite le décalage UTC de toISOString() */
function _isoLocal(d) {
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function _agendaDayStatus(pts, ptsMax) {
  const pct = ptsMax > 0 ? pts / ptsMax : 0;
  if(pts === 0)      return { cls:'bred',   label:'Vide',         bar:'#e74c3c' };
  if(pct < 0.5)     return { cls:'bred',   label:'Sous-chargé',  bar:'#e74c3c' };
  if(pct < 0.85)    return { cls:'bamber', label:'À compléter',  bar:'#f39c12' };
  if(pct <= 1.0)    return { cls:'bgreen', label:'OK',           bar:'var(--accent)' };
  return              { cls:'bred',   label:'Surchargé',   bar:'#e74c3c' };
}

function _buildWeekDays(offsetWeek) {
  const today      = new Date();
  const dayOfWeek  = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const lundi      = new Date(today);
  lundi.setDate(today.getDate() - dayOfWeek + offsetWeek * 7);
  const jours = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
  return jours.map((nom, i) => {
    const d = new Date(lundi);
    d.setDate(lundi.getDate() + i);
    return { nom, date: d, iso: _isoLocal(d), dayIdx: i };
  });
}

async function _enregistrerAgenda() {
  const changes = Object.values(_agendaPending);
  if(!changes.length) return;
  const btn = document.getElementById('btnAgendaEnregistrer');
  if(btn) { btn.disabled = true; btn.textContent = 'Enregistrement…'; }
  let ok = 0, err = 0;
  for(const c of changes) {
    try {
      if(c.type === 'supprimer') {
        const r = await fetch(`/api/agenda/meeting/${c.meeting_id}/delete`, {method:'POST'});
        const d = await r.json();
        if(d.deleted > 0 || d.ok !== false) ok++; else err++;
      } else if(c.type === 'deplacer') {
        const r = await fetch(`/api/agenda/meeting/${c.meeting_id}/update`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ heure: c.heure, duree_min: c.duree_min, type_visite: c.type_visite, date_str: c.date_str }),
        });
        const d = await r.json();
        if(d.ok !== false) ok++; else err++;
      }
    } catch(e) { err++; }
  }
  Object.keys(_agendaPending).forEach(k => delete _agendaPending[k]);
  Object.keys(S.cache).forEach(k=>{ if(k.startsWith('agenda_')) delete S.cache[k]; });
  renderAgenda(_agendaOffset);
  if(err)
    showToast(`${ok} ok · ${err} erreur${err>1?'s':''} lors de l'enregistrement`, 'error');
  else
    showToast(`${ok} modification${ok>1?'s':''} enregistrée${ok>1?'s':''} sur HubSpot`, 'success');
}

/** Vide tout le cache agenda côté client + re-render. À appeler après toute modification HubSpot. */
async function _agendaRefreshAfterSave() {
  Object.keys(S.cache).forEach(k => { if(k.startsWith('agenda_')) delete S.cache[k]; });
  await renderAgenda();
}

// ── Agenda week grid ──────────────────────────────────────────────────────────
function _agendaWeekGrid(days, allMeetings, hub_id) {
  const HOUR_H  = 56;
  const H_START = 8;
  const H_END   = 20;
  const TOTAL_H = (H_END - H_START) * HOUR_H;
  const HEADER_H = 88;
  const _INACTIVE = ['CANCELED','NO_SHOW'];

  // Index meetings by day
  const byDay = {};
  days.forEach(d => { byDay[d.iso] = []; });
  allMeetings.forEach(m => {
    const iso = (m.dt||'').split('T')[0];
    if(byDay[iso]) byDay[iso].push(m);
  });

  const todayIso = _isoLocal(new Date());
  const now = new Date();
  const nowH = now.getHours() + now.getMinutes() / 60;
  const nowTop = (nowH - H_START) * HOUR_H;
  const showNow = nowH >= H_START && nowH < H_END;

  // ── Legend ──────────────────────────────────────────────────────────────────
  const legendHtml = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);
                background:var(--surface);font-size:10px">
      ${Object.entries(_MTG_COLORS).filter(([k])=>k!=='?').map(([k,c])=>`
        <span style="display:inline-flex;align-items:center;gap:4px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:2px;
            background:${c.bg};border-left:2px solid ${c.bd}"></span>
          <span style="color:var(--text-muted);font-weight:600">${k}</span>
          <span style="color:var(--text-muted)">${c.label}</span>
        </span>`).join('')}
      <span class="week-legend-hint" style="margin-left:auto;color:var(--text-muted)">Double-clic sur un créneau vide pour ajouter · Double-clic sur un RDV pour modifier · Glisser-déposer pour déplacer</span>
    </div>`;

  // ── Time column ─────────────────────────────────────────────────────────────
  const timeLabels = Array.from({length: H_END - H_START + 1}, (_, i) => {
    const h = H_START + i;
    return `<div class="week-time-label" style="top:${HEADER_H + i * HOUR_H}px">${h}h</div>`;
  }).join('');

  // ── Day columns ─────────────────────────────────────────────────────────────
  const daysHtml = days.map(day => {
    const isToday = day.iso === todayIso;
    const isFerie = _FR_HOLIDAYS.has(day.iso);
    const dayMtgs = byDay[day.iso] || [];
    const activeMtgs   = dayMtgs.filter(m => !_INACTIVE.includes(m.outcome||''));
    const inactiveMtgs = dayMtgs.filter(m =>  _INACTIVE.includes(m.outcome||''));
    const pts    = activeMtgs.reduce((s,m) => s + (_CREDITS[m.type]||1), 0);
    const ptsMax = _CREDITS_MAX[day.dayIdx] ?? 10;
    const st     = _agendaDayStatus(pts, ptsMax);
    const pct    = Math.min(Math.round(pts/ptsMax*100), 100);

    // ── Stats VC/VP pour le header ───────────────────────────────────────────
    const nbVC  = activeMtgs.filter(m => ['VC','RC','F'].includes((m.type||'').toUpperCase())).length;
    const nbVP  = activeMtgs.filter(m => ['VP','RP'].includes((m.type||'').toUpperCase())).length;
    const ratioOk = nbVC + nbVP === 0 || Math.abs(nbVC / (nbVC + nbVP) - 0.4) <= 0.2;
    const vcvpHtml = (!isFerie && (nbVC + nbVP) > 0)
      ? `<div style="font-size:9px;margin-top:3px;color:${ratioOk?'var(--text-muted)':'#e67e22'}">
           <span style="color:${_MTG_COLORS.VC.tx}">${nbVC} VC</span>
           <span style="opacity:.5;margin:0 2px">·</span>
           <span style="color:${_MTG_COLORS.VP.tx}">${nbVP} VP</span>
           ${!ratioOk?`<span style="margin-left:3px;opacity:.8">⚠</span>`:''}
         </div>` : '';

    // ── Boutons "Compléter" et "Optimiser trajet" ────────────────────────────
    const sousCharge = !isFerie && pct < 50;
    const completerBtn = sousCharge
      ? `<button onclick="event.stopPropagation();_completerJour('${day.iso}')"
           style="display:flex;align-items:center;justify-content:center;gap:3px;width:100%;margin-top:4px;padding:2px 0;border-radius:4px;border:1px dashed var(--accent);
             background:rgba(var(--accent-rgb),.06);color:var(--accent);font-size:9px;font-weight:700;cursor:pointer;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="9" height="9"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> Compléter
         </button>` : '';
    const optimiserBtn = !isFerie && activeMtgs.length >= 2
      ? `<button onclick="event.stopPropagation();_optimiserJour('${day.iso}')"
           style="display:block;width:100%;margin-top:2px;padding:2px 0;border-radius:4px;border:1px solid var(--border);
             background:transparent;color:var(--text-muted);font-size:9px;cursor:pointer;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
           🗺 Trajet
         </button>` : '';

    // Header
    const headHtml = `
      <div class="week-day-head ${isToday?'week-today-head':''}" style="height:${HEADER_H}px;box-sizing:border-box">
        <div class="week-day-name" style="${isToday?'color:var(--accent)':isFerie?'color:#f39c12':''}">
          ${isFerie?'🏖 ':''}${day.nom}
          ${isToday?`<span style="font-size:9px;background:var(--accent);color:#fff;border-radius:4px;
            padding:1px 4px;margin-left:4px;vertical-align:middle">Auj.</span>`:''}
        </div>
        <div class="week-day-meta">${day.date.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'2-digit'})}</div>
        ${isFerie
          ? `<div style="font-size:9px;color:#f39c12;margin-top:4px">Jour férié</div>`
          : `<div style="height:2px;border-radius:1px;background:var(--surface2);margin-top:4px">
               <div style="height:2px;border-radius:1px;width:${pct}%;background:${st.bar};transition:width .4s"></div>
             </div>
             <div style="display:flex;justify-content:space-between;margin-top:2px">
               <span style="font-size:9px;font-weight:700;color:${st.bar}">${st.label}</span>
               <span style="font-size:9px;color:var(--text-muted)">${pts}/${ptsMax}pts</span>
             </div>
             ${vcvpHtml}
             ${completerBtn}
             ${optimiserBtn}`
        }
      </div>`;

    // Grid lines
    const gridLines = Array.from({length: H_END - H_START}, (_, i) => {
      const h = H_START + i;
      return `<div class="week-hour-line ${h===12?'midday':''}" style="top:${i*HOUR_H}px"></div>`;
    }).join('');

    // Meeting blocks
    const mtgsHtml = isFerie ? '' : [...activeMtgs, ...inactiveMtgs].map(m => {
      const dimmed = _INACTIVE.includes(m.outcome||'');
      const type   = (m.type||'').toUpperCase();
      const c      = _mtgColor(type);
      const outcome = m.outcome || 'SCHEDULED';
      const [hh, mm] = (m.heure||'09:00').split(':').map(Number);
      if(isNaN(hh) || hh < H_START || hh >= H_END) return '';
      const top    = (hh - H_START) * HOUR_H + (mm / 60) * HOUR_H;
      const dur    = _MTG_DUR[type] || 60;
      const height = Math.max((dur / 60) * HOUR_H - 3, 22);
      const hsUrl  = m.company_id && hub_id
        ? `href="https://app.hubspot.com/contacts/${hub_id}/company/${m.company_id}" target="_blank"` : '';
      const crFait    = outcome === 'COMPLETED' && m.has_note;
      const crManquant= outcome === 'COMPLETED' && !m.has_note;
      const canceled  = _INACTIVE.includes(outcome) && outcome !== 'COMPLETED';

      // Couleur du bloc : toujours basée sur le type, état CR signalé par border + badge
      let blockBg, blockBd, blockOpacity;
      if(canceled || dimmed) {
        blockBg      = 'rgba(128,128,128,.08)';
        blockBd      = 'rgba(128,128,128,.3)';
        blockOpacity = '.4';
      } else {
        blockBg      = c.bg;
        blockBd      = crManquant ? '#ea580c' : crFait ? '#16a34a' : c.bd;
        blockOpacity = crFait ? '.65' : '1';
      }

      const statusBadge = crFait
        ? `<span style="font-size:8px;font-weight:800;color:#16a34a">✓</span>`
        : crManquant
          ? `<span style="font-size:7px;font-weight:900;color:#ea580c;background:rgba(234,88,12,.15);
               border-radius:3px;padding:0 3px;letter-spacing:.03em">CR !</span>`
          : canceled
            ? `<span style="font-size:8px;color:#e74c3c">✗</span>`
            : '';
      const mtgData = JSON.stringify({id:m.id, titre:m.titre, type, heure:m.heure, outcome, company_nom:m.company_nom, company_id:m.company_id, date_str:day.iso}).replace(/"/g,'&quot;');

      return `
        <div class="week-mtg" draggable="true"
          style="top:${top}px;height:${height}px;background:${blockBg};
            border-left:3px solid ${blockBd};cursor:grab;opacity:${blockOpacity}"
          ondragstart="_agendaDragStart(event,'${m.id}','${day.iso}')"
          ondragend="_dragMtg=null"
          ondragover="event.preventDefault()"
          ondblclick="_agendaEditMtg(event,'${m.id}','${day.iso}',${height<40?'true':'false'})"
          title="${m.company_nom||m.titre||''} · ${type} · ${m.heure}">
          <button onclick="event.stopPropagation();deleteMeeting('${m.id}')" title="Supprimer"
            style="position:absolute;top:1px;right:1px;background:none;border:none;
                   color:${c.tx};cursor:pointer;font-size:11px;line-height:1;padding:1px 3px;opacity:.6"
            onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.6">×</button>
          <div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap">
            <span style="font-size:8px;font-weight:800;color:${c.tx};letter-spacing:.02em">${type}</span>
            <span style="font-size:8px;color:var(--text-muted)">${m.heure}</span>
            ${statusBadge}
          </div>
          <div class="week-mtg-title" style="color:${c.tx}">
            ${hsUrl?`<a ${hsUrl} onclick="event.stopPropagation()">${m.company_nom||m.titre||'–'}</a>`:(m.company_nom||m.titre||'–')}
          </div>
        </div>`;
    }).join('');

    // "Now" line
    const nowLine = isToday && showNow
      ? `<div style="position:absolute;left:0;right:0;top:${nowTop}px;height:2px;
           background:var(--accent);z-index:5;pointer-events:none">
           <div style="position:absolute;left:-4px;top:-4px;width:9px;height:9px;
             background:var(--accent);border-radius:50%"></div>
         </div>` : '';

    // Drop zone for drag & drop
    const dropAttr = isFerie ? '' : `
      ondragover="event.preventDefault();event.dataTransfer.dropEffect='move';this.style.background='rgba(249,115,22,.07)'"
      ondragleave="if(!this.contains(event.relatedTarget)){this.style.background=''}"
      ondrop="_agendaDrop(event,'${day.iso}');this.style.background=''"`;

    // Double-click on empty space → create
    const dblClickCreate = isFerie ? '' :
      `ondblclick="_agendaCreateOnSlot(event,'${day.iso}',${HOUR_H},${H_START})"`;

    return `
      <div class="week-day-col">
        ${headHtml}
        <div class="week-day-body ${isFerie?'week-ferie':''}" style="height:${TOTAL_H}px"
          ${dropAttr} ${dblClickCreate}>
          ${gridLines}${mtgsHtml}${nowLine}
        </div>
      </div>`;
  }).join('');

  return `
    ${legendHtml}
    <div style="position:relative;height:${HEADER_H + TOTAL_H}px;overflow:hidden">
      <div class="week-time-col" style="position:absolute;left:0;top:0;bottom:0">
        ${timeLabels}
      </div>
      <div class="week-days-grid" style="position:absolute;left:30px;right:0;top:0;bottom:0">
        ${daysHtml}
      </div>
    </div>`;
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
function _agendaDragStart(e, meetingId, fromDay) {
  _dragMtg = { id: meetingId, fromDay };
  _dragSugg = null;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', meetingId);
}

function _suggDragStart(e, jourDate, idx) {
  if(!_planifState.data) return;
  const jour = _planifState.data.jours.find(j => j.date_str === jourDate);
  if(!jour) return;
  const excl = _planifState.exclus;
  const visibles = (jour.suggestions || []).filter(s => !excl.has(s.id_hubspot));
  const sugg = visibles[idx];
  if(!sugg) return;
  _dragSugg = { sugg, jourDate };
  _dragMtg  = null;
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', 'sugg:' + sugg.id_hubspot);
}

async function _agendaDrop(e, toDay) {
  e.preventDefault();

  // ── Cas 1 : drop d'une suggestion depuis le panneau planif ──────────────────
  if(_dragSugg) {
    const { sugg } = _dragSugg;
    _dragSugg = null;

    const rect = e.currentTarget.getBoundingClientRect();
    const relY  = e.clientY - rect.top;
    const HOUR_H = 56; const H_START = 8;
    const rawH = H_START + Math.max(0, relY) / HOUR_H;
    let h = Math.max(H_START, Math.min(19, Math.floor(rawH)));
    let m = Math.round((rawH - h) * 60 / 15) * 15;
    if(m >= 60) { h = Math.min(19, h + 1); m = 0; }
    const heure = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const offset = new Date().toTimeString().match(/([+-]\d{2}:\d{2})/)?.[1] || '+00:00';

    try {
      const r = await fetch('/api/creer', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ visites: [{
          dt_start: `${toDay}T${heure}:00${offset}`,
          type_visite: sugg.type_visite,
          pharmacie: { nom: sugg.nom, id_hubspot: sugg.id_hubspot, ville: sugg.ville, cp: sugg.cp }
        }]})
      });
      const res = await r.json();
      if(res.created > 0) {
        _planifState.exclus.add(sugg.id_hubspot);
        await _agendaRefreshAfterSave();
      } else {
        alert('Erreur création meeting.');
      }
    } catch(err) { alert('Erreur réseau : ' + err.message); }
    return;
  }

  // ── Cas 2 : déplacement d'un meeting existant ────────────────────────────────
  if(!_dragMtg) return;
  const { id, fromDay } = _dragMtg;
  _dragMtg = null;

  // Calculer l'heure du drop depuis la position Y
  // e.currentTarget = .week-day-body (pas le header) → pas de décalage à soustraire
  const rect = e.currentTarget.getBoundingClientRect();
  const relY  = e.clientY - rect.top;
  const HOUR_H = 56; const H_START = 8;
  const rawH = H_START + Math.max(0, relY) / HOUR_H;
  let h  = Math.max(H_START, Math.min(19, Math.floor(rawH)));
  let m  = Math.round((rawH - h) * 60 / 15) * 15;
  if(m >= 60) { h = Math.min(19, h + 1); m = 0; }
  const heure = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

  // Trouver le meeting dans le cache
  let mtgType = 'VC', mtgDur = 60, foundMtg = null;
  for(const key of Object.keys(S.cache)) {
    const d = S.cache[key];
    if(!d || !d.meetings) continue;
    const found = d.meetings.find(x=>x.id===id);
    if(found) { foundMtg = found; mtgType = found.type||'VC'; mtgDur = _MTG_DUR[mtgType]||60; break; }
  }

  // Optimistic update — déplacer immédiatement dans le cache
  if(foundMtg) {
    for(const key of Object.keys(S.cache)) {
      const d = S.cache[key];
      if(!d || !d.meetings) continue;
      // Supprimer du jour d'origine
      const idx = d.meetings.findIndex(x=>x.id===id);
      if(idx !== -1) {
        const [removed] = d.meetings.splice(idx, 1);
        // Insérer dans le bon jour (si la clé de cache correspond à la semaine courante)
        removed.dt = `${toDay}T${heure}:00`;
        removed.heure = heure;
        d.meetings.push(removed);
      }
    }
    renderAgenda(_agendaOffset);
  }

  // Stocker en attente — pas de sync HubSpot immédiate
  _agendaPending[id] = { type: 'deplacer', meeting_id: id, date_str: toDay, heure, duree_min: mtgDur, type_visite: mtgType };
  _agendaUpdateEnregistrerBtn();
}

// ── Créer en double-cliquant sur un créneau vide ──────────────────────────────
function _agendaCreateOnSlot(e, dayIso, hourH, hStart) {
  // Ignorer si le dblclick vient d'un meeting (il remonte mais on stoppe là-bas)
  if(e.target.closest('.week-mtg')) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const relY = e.clientY - rect.top;
  const rawH = hStart + relY / hourH;
  const h  = Math.max(hStart, Math.min(19, Math.floor(rawH)));
  const m  = Math.round((rawH - h) * 60 / 15) * 15;
  const heure = `${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  _agendaShowCreateModal(dayIso, heure);
}

          onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='#fff'">
          Annuler
        </button>
        <button id="mc_submit" onclick="_agendaCreateManual('${dayIso}')"
          style="padding:9px 22px;border:none;border-radius:8px;background:#f97316;
                 color:#fff;font-size:13px;font-weight:700;cursor:pointer;min-width:130px"
          onmouseover="this.style.background='#ea6c0a'" onmouseout="this.style.background='#f97316'">
          Créer le RDV
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  document.getElementById('mc_nom').focus();
  // Auto-ajuster durée selon type + marquer comme modifié manuellement
  document.getElementById('mc_type').addEventListener('change', function() {
    this.dataset.userChanged = '1';
    document.getElementById('mc_dur').value = _MTG_DUR[this.value] || 60;
  });
}

async function _agendaCreateManual(dayIso) {
  const nomInput = document.getElementById('mc_nom');
  const nom      = (nomInput ? nomInput.value : '').trim();
  const type     = (document.getElementById('mc_type')  || {}).value || 'VC';
  const heure    = (document.getElementById('mc_heure') || {}).value || '09:00';
  const dur      = parseInt((document.getElementById('mc_dur') || {}).value || '60');
  const id_hubspot = (document.getElementById('mc_id_hubspot') || {}).value || '';
  const ville    = (document.getElementById('mc_ville') || {}).value || '';
  const cp       = (document.getElementById('mc_cp')    || {}).value || '';

  const errDiv = document.getElementById('mc_error');
  const btn    = document.getElementById('mc_submit');

  if(!nom) {
    if(errDiv) { errDiv.textContent = 'Veuillez saisir ou sélectionner une pharmacie.'; errDiv.style.display='block'; }
    if(nomInput) nomInput.focus();
    return;
  }
  if(errDiv) errDiv.style.display = 'none';
  if(btn) { btn.disabled=true; btn.textContent='Création en cours…'; }

  const offset = '+02:00';
  const visites = [{
    dt_start: `${dayIso}T${heure}:00${offset}`,
    type_visite: type,
    duree_min: dur,
    pharmacie: { nom, id_hubspot, ville, cp },
  }];

  try {
    const r = await fetch('/api/creer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ visites }),
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const res = await r.json();

    if(res.created > 0) {
      document.getElementById('agendaModal')?.remove();

      // ── Mise à jour optimiste : injecter le meeting immédiatement ──────────
      const hsIds   = res.hubspot_ids || {};
      const meetingId = String(hsIds['0'] || hsIds[0] || ('tmp_' + Date.now()));
      const newMtg  = {
        id:          meetingId,
        titre:       `${type} — ${nom}`,
        type:        type,
        outcome:     'SCHEDULED',
        dt:          `${dayIso}T${heure}:00`,
        date_label:  '',
        heure:       heure,
        company_id:  id_hubspot || '',
        company_nom: nom,
      };
      const ck = `agenda_${_agendaOffset}`;
      if(S.cache[ck] && Array.isArray(S.cache[ck].meetings)) {
        S.cache[ck].meetings.push(newMtg);
      } else {
        S.cache[ck] = { meetings: [newMtg], hub_id: S.hub_id || '' };
      }
      renderAgenda(_agendaOffset); // rendu immédiat

      // ── Refresh silencieux après 3 s pour récupérer les vraies données ─────
      setTimeout(() => {
        Object.keys(S.cache).forEach(k => { if(k.startsWith('agenda_')) delete S.cache[k]; });
        renderAgenda(_agendaOffset);
      }, 3000);

    } else {
      const msg = (res.errors||[]).join(', ') || JSON.stringify(res);
      if(errDiv) { errDiv.textContent = 'Échec création : ' + msg; errDiv.style.display='block'; }
      if(btn) { btn.disabled=false; btn.textContent='Créer le RDV'; }
    }
  } catch(err) {
    if(errDiv) { errDiv.textContent = 'Erreur réseau : ' + err.message; errDiv.style.display='block'; }
    if(btn) { btn.disabled=false; btn.textContent='Créer le RDV'; }
  }
}

// ── Autocomplete pharmacie (modal création) ───────────────────────────────────
let _mcTimer = null;
let _mcIdx   = -1;
let _mcItems = [];

async function _mcSearch(q) {
  clearTimeout(_mcTimer);
  const drop = document.getElementById('mc_drop');
  if(!q || q.length < 2) { drop.style.display='none'; _mcItems=[]; _mcIdx=-1; return; }
  _mcTimer = setTimeout(async () => {
    try {
      const r = await fetch(`/api/pharmacies/search?q=${encodeURIComponent(q)}&limit=20`);
      const d = await r.json();
      _mcItems = d.results || [];
      _mcIdx = -1;
      _mcRenderDrop();
    } catch(e) {}
  }, 180);
}

function _mcRenderDrop() {
  const drop = document.getElementById('mc_drop');
  if(!drop || !_mcItems.length) { if(drop) drop.style.display='none'; return; }
  drop.innerHTML = '';
  _mcItems.forEach((p, i) => {
    const el = document.createElement('div');
    el.style.cssText = `padding:9px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;
      display:flex;justify-content:space-between;align-items:center;transition:background .1s`;
    el.innerHTML = `
      <div>
        <div style="font-size:12px;font-weight:600;color:#111">${p.nom}</div>
        <div style="font-size:10px;color:#888">${p.ville} · ${p.cp}</div>
      </div>
      <span style="font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;flex-shrink:0;margin-left:8px;
        background:${p.is_client?'#dcfce7':'#dbeafe'};color:${p.is_client?'#15803d':'#1d4ed8'}">
        ${p.is_client?'Client':'Prospect'}
      </span>`;
    el.addEventListener('mouseover', () => {
      _mcIdx = i;
      drop.querySelectorAll('div[data-mc]').forEach((d,j)=>{ d.style.background = j===i?'#fff5ee':''; });
    });
    el.dataset.mc = i;
    el.addEventListener('click', () => _mcSelect(i));
    drop.appendChild(el);
  });
  drop.style.display = 'block';
}

function _mcSelect(i) {
  const p = _mcItems[i];
  if(!p) return;

  // Remplir l'input
  const nomEl = document.getElementById('mc_nom');
  if(nomEl) { nomEl.value = p.nom; nomEl.style.borderColor = '#22c55e'; nomEl.style.background = '#f0fdf4'; }

  // Remplir les champs cachés
  const hidId = document.getElementById('mc_id_hubspot');
  if(hidId) hidId.value = p.id_hubspot || '';
  const hidV = document.getElementById('mc_ville');
  if(hidV) hidV.value = p.ville || '';
  const hidC = document.getElementById('mc_cp');
  if(hidC) hidC.value = p.cp || '';

  // Fermer le dropdown
  const drop = document.getElementById('mc_drop');
  if(drop) drop.style.display = 'none';
  _mcItems = []; _mcIdx = -1;

  // Auto-suggérer type si pas encore modifié manuellement
  const typeEl = document.getElementById('mc_type');
  if(typeEl && !typeEl.dataset.userChanged) {
    typeEl.value = p.is_client ? 'VC' : 'VP';
    const durEl = document.getElementById('mc_dur');
    if(durEl) durEl.value = _MTG_DUR[typeEl.value] || 60;
  }

  // Masquer erreur précédente
  const errDiv = document.getElementById('mc_error');
  if(errDiv) errDiv.style.display = 'none';

  // Focus sur le bouton Créer
  const btn = document.getElementById('mc_submit');
  if(btn) btn.focus();
}

function _mcKey(e) {
  const drop = document.getElementById('mc_drop');
  if(!drop || drop.style.display === 'none') return;
  if(e.key === 'ArrowDown') {
    e.preventDefault();
    _mcIdx = Math.min(_mcIdx + 1, _mcItems.length - 1);
    drop.querySelectorAll('div[data-mc]').forEach((d,j)=>{ d.style.background = j===_mcIdx?'#fff5ee':''; });
  } else if(e.key === 'ArrowUp') {
    e.preventDefault();
    _mcIdx = Math.max(_mcIdx - 1, 0);
    drop.querySelectorAll('div[data-mc]').forEach((d,j)=>{ d.style.background = j===_mcIdx?'#fff5ee':''; });
  } else if(e.key === 'Enter' && _mcIdx >= 0) {
    e.preventDefault();
    _mcSelect(_mcIdx);
  } else if(e.key === 'Escape') {
    drop.style.display = 'none';
  }
}

async function _agendaSaveMtg(meetingId, dayIso) {
  const type  = document.getElementById('me_type').value;
  const heure = document.getElementById('me_heure').value;
  const dur   = parseInt(document.getElementById('me_dur').value);
  const btn = document.querySelector('#agendaModal .btn-primary');
  if(btn) { btn.disabled=true; btn.textContent='Enregistrement…'; }
  try {
    const r = await fetch(`/api/agenda/meeting/${meetingId}/update`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ heure, duree_min: dur, type_visite: type, date_str: dayIso }),
    });
    const res = await r.json();
    document.getElementById('agendaModal')?.remove();
    if(res.ok) {
      Object.keys(S.cache).forEach(k=>{ if(k.startsWith('agenda_')) delete S.cache[k]; });
      renderAgenda(_agendaOffset);
    } else {
      alert('Erreur sauvegarde : ' + (res.error||''));
    }
  } catch(err) {
    if(btn) { btn.disabled=false; btn.textContent='Enregistrer'; }
    alert('Erreur réseau : ' + err.message);
  }
}

function deleteMeeting(meetingId) {
  // Stocker en attente — pas de sync HubSpot immédiate
  _agendaPending[meetingId] = { type: 'supprimer', meeting_id: meetingId };
  // Retirer du cache pour mise à jour optimiste de l'UI
  for(const key of Object.keys(S.cache)) {
    const d = S.cache[key];
    if(!d || !d.meetings) continue;
    const idx = d.meetings.findIndex(m => m.id === meetingId);
    if(idx !== -1) { d.meetings.splice(idx, 1); break; }
  }
  renderAgenda(_agendaOffset);
  _agendaUpdateEnregistrerBtn();
}

async function renderAgenda(offset) {
  const _gen = _navGen;
  if(offset !== undefined) _agendaOffset = offset;

  // Pré-charger les stats planif en arrière-plan (villes, origines, DN refs)
  if(!_planifState._stats && !_planifState._statsLoading) {
    _planifState._statsLoading = true;
    fetch('/api/stats').then(r=>r.json()).then(s=>{
      if((s.produits || []).length > 0) {
        _planifState._stats = s;
        _planifState._statsFetched = true;
      }
      _planifState._statsLoading = false;
      _planifFillChips();
      // Pas de _planifRefresh() pour ne pas détruire la saisie en cours
    }).catch(()=>{ _planifState._statsLoading = false; });
  }

  // Charger semaine courante (+ semaine suivante si quinzaine)
  const offsets = _agendaView === 'quinzaine'
    ? [_agendaOffset, _agendaOffset + 1]
    : [_agendaOffset];

  const AGENDA_TTL = 90_000; // 90 s — assez court pour éviter les fantômes

  // N'afficher "Chargement…" que si on n'a pas encore de données en cache
  const allCached = offsets.every(o => !!S.cache[`agenda_${o}`]);
  if(!allCached) setContent('<div class="empty">Chargement…</div>', _gen);

  const datasets = await Promise.all(offsets.map(async o => {
    const key = `agenda_${o}`;
    const cached = S.cache[key];
    const stale = !cached || (Date.now() - (cached._ts || 0)) > AGENDA_TTL;
    if(stale) {
      // force=1 bypass aussi le TTL Python côté serveur pour offset=0
      const r = await api(`/api/agenda?offset=${o}${o===0?'&force=1':''}`);
      r._ts = Date.now();
      S.cache[key] = r;
    }
    return S.cache[key];
  }));

  const hub_id      = datasets[0].hub_id || S.hub_id;
  // Purger les meetings CANCELED/archivés du calcul de points
  const _ACTIVE = m => !['CANCELED','NO_SHOW'].includes(m.outcome||'');
  const allMeetings = datasets.flatMap(d => d.meetings || []);
  const todayIso    = _isoLocal(new Date());

  // Construire les jours des semaines affichées
  const allDays = offsets.flatMap(o => _buildWeekDays(o));

  // ── Analyse conformité ──────────────────────────────────────────────────
  const dayStats = allDays.map(day => {
    const dayMeetings = allMeetings.filter(m => (m.dt||'').startsWith(day.iso));
    const activeMeetings = dayMeetings.filter(_ACTIVE);
    const pts    = activeMeetings.reduce((s,m) => s + (_CREDITS[m.type]||1), 0);
    const ptsMax = _CREDITS_MAX[day.dayIdx] ?? 10;
    const st     = _agendaDayStatus(pts, ptsMax);
    return { ...day, pts, ptsMax, st, n: activeMeetings.length };
  }).filter(d => d.iso >= todayIso);

  const conformes   = dayStats.filter(d => d.st.label === 'OK');
  const aCompleter  = dayStats.filter(d => ['Sous-chargé','À compléter','Vide'].includes(d.st.label));
  const surcharges  = dayStats.filter(d => d.st.label === 'Surchargé');

  // ── Compact stats ribbon ────────────────────────────────────────────────
  const activeMtgsAll = allMeetings.filter(m => !['CANCELED','NO_SHOW'].includes(m.outcome||''));
  const totalPts  = activeMtgsAll.reduce((s,m) => s + (_CREDITS[m.type]||1), 0);
  const totalVC   = activeMtgsAll.filter(m => m.type==='VC').length;
  const totalVP   = activeMtgsAll.filter(m => m.type==='VP').length;
  const maxPts    = dayStats.reduce((s,d) => s + d.ptsMax, 0);
  const allOK     = aCompleter.length === 0 && surcharges.length === 0;

  const statsRibbonHtml = `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;
                background:var(--surface);border:1px solid var(--border);border-radius:var(--r-2xl);
                margin-bottom:14px;flex-wrap:wrap">
      <span class="fw6" style="font-size:13px">${activeMtgsAll.length} RDV</span>
      <span class="muted" style="font-size:12px">·</span>
      <span class="fw6" style="font-size:13px">${totalPts}<span class="muted fw4">/${maxPts} pts</span></span>
      <span class="muted" style="font-size:12px">·</span>
      <span class="fw6 small">${totalVC} VC · ${totalVP} VP</span>
      <span class="muted" style="font-size:12px">·</span>
      <span class="fw6 small" style="color:${allOK?'var(--green)':'var(--amber)'}">
        ${conformes.length}/${dayStats.length} jours OK
      </span>
      ${surcharges.map(d=>`<span class="badge bred" style="font-size:10px">${d.nom.slice(0,3)} ${d.date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} · Surchargé</span>`).join('')}
      ${aCompleter.map(d=>`<span class="badge bamber" style="font-size:10px">${d.nom.slice(0,3)} ${d.date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} · ${d.st.label}</span>`).join('')}
      ${allOK
        ? `<span class="badge bgreen" style="margin-left:auto;font-size:10px">✓ Semaine complète</span>`
        : `<button class="btn btn-primary btn-sm" style="margin-left:auto;display:flex;align-items:center;gap:4px" onclick="_planifFiltersOpen=true;_planifEnsureStats();_planifRefresh()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Compléter la semaine
          </button>`}
    </div>`;

  // ── Grilles semaines ────────────────────────────────────────────────────
  const grids = offsets.map((o, idx) => {
    const weekDays  = _buildWeekDays(o);
    const weekMtgs  = datasets[idx].meetings || [];
    const wLabel    = `${weekDays[0].date.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})} – ${weekDays[4].date.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}`;
    const activeWk  = weekMtgs.filter(m=>!['CANCELED','NO_SHOW'].includes(m.outcome||''));
    const wPts      = activeWk.reduce((s,m)=>s+(_CREDITS[m.type]||1),0);
    const wVC       = activeWk.filter(m=>m.type==='VC').length;
    const wVP       = activeWk.filter(m=>m.type==='VP').length;
    const wPtsMax   = _buildWeekDays(o).reduce((s,d)=>s+(_CREDITS_MAX[d.dayIdx]??10),0);
    return `
      <div class="card" style="margin-bottom:16px">
        <div class="card-header" style="padding-bottom:8px">
          <div class="card-header-row">
            <div>
              <div class="card-title" style="font-size:13px">${idx===0?'Semaine en cours':'Semaine suivante'}</div>
              <div class="card-desc">${wLabel}</div>
            </div>
            <div class="row" style="gap:8px;align-items:center">
              <span class="small muted">${wVC} VC · ${wVP} VP</span>
              <span class="small fw6">${wPts}<span class="muted fw4">/${wPtsMax} pts</span></span>
            </div>
          </div>
        </div>
        <div class="card-body agenda-week-scroll" style="padding-top:0;padding-left:0;padding-right:0">
          ${_agendaWeekGrid(weekDays, weekMtgs, hub_id)}
        </div>
      </div>`;
  }).join('');

  const isCurrentWeek = _agendaOffset === 0;

  // Semaine courante label pour la nav
  const navWeekDays = _buildWeekDays(_agendaOffset);
  const weekLabel = `${navWeekDays[0].date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – ${navWeekDays[4].date.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}`;

  // Synchroniser la date du planif avec la semaine affichée (toujours)
  const _newDateDebut = _isoLocal(_buildWeekDays(_agendaOffset)[0].date);
  if(_planifState.date_debut !== _newDateDebut) {
    _planifState.date_debut = _newDateDebut;
    _planifState.data = null;
    _planifActiveJour = null; // reset jour actif si on change de semaine
  }

  const agendaColHtml = `
    <div class="agenda-nav-row row-sb" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="row" style="gap:6px;align-items:center">
        <button class="btn btn-outline btn-sm" onclick="renderAgenda(${_agendaOffset-1})" title="Semaine précédente">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="fw6" style="font-size:13px;padding:0 4px;text-align:center">${weekLabel}</span>
        <button class="btn btn-outline btn-sm" onclick="renderAgenda(${_agendaOffset+1})" title="Semaine suivante">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        ${!isCurrentWeek?`<button class="btn btn-ghost btn-sm" onclick="renderAgenda(0)" style="color:var(--accent)">Auj.</button>`:''}
      </div>
      <div class="agenda-nav-btns row" style="gap:6px">
        <button onclick="_agendaView='semaine';renderAgenda()" class="btn btn-sm ${_agendaView==='semaine'?'btn-primary':'btn-outline'}">Semaine</button>
        <button onclick="_agendaView='quinzaine';renderAgenda()" class="agenda-btn-quinzaine btn btn-sm ${_agendaView==='quinzaine'?'btn-primary':'btn-outline'}">Quinzaine</button>
        <button onclick="_exportAgendaIcs()" class="agenda-btn-outlook btn btn-outline btn-sm" title="Exporter la semaine en .ics Outlook">Outlook</button>
        <button id="btnAgendaEnregistrer" onclick="_enregistrerAgenda()" class="btn btn-primary btn-sm"
          style="display:${Object.keys(_agendaPending).length?'':'none'}">
          Enregistrer (${Object.keys(_agendaPending).length})
        </button>
      </div>
    </div>
    ${statsRibbonHtml}
    ${grids}`;

  // Garde : si l'utilisateur a navigué vers une autre section pendant le chargement, on abandonne
  if(S.active !== 'agenda' && S.active !== 'planificateur') return;

  const existingCol = document.getElementById('agenda-col');
  if(_gen !== _navGen) return; // stale — another navigate() fired since we started
  if(existingCol) {
    existingCol.innerHTML = agendaColHtml;
    const fp = document.getElementById('planif-filters');
    if(fp) fp.innerHTML = _renderFilterPanel();
  } else {
    const fpW = _planifFiltersOpen ? '264px' : '44px';
    setContent(`
      <div style="display:flex;gap:12px;align-items:start">
        <div id="planif-filters" style="width:${fpW};flex-shrink:0;position:sticky;top:0;max-height:calc(100vh - 64px);overflow-y:auto;border-radius:12px;border:1px solid var(--border);background:var(--bg-card);transition:width .2s;overflow-x:hidden">
          ${_renderFilterPanel()}
        </div>
        <div id="agenda-col" style="flex:1;min-width:0">${agendaColHtml}</div>
      </div>`);
  }
}

// ══════════════════════════════════════
// MODULE — PLANIFICATEUR INTELLIGENT
// ══════════════════════════════════════

// ── Panneau filtres gauche (collapsible) ──────────────────────────────────────
function _renderFilterPanel() {
  const p    = _planifState.p;
  const d    = _planifState.data;
  const excl = _planifState.exclus;
  const nbFiltres = p.departements.length + p.villes.length
    + (p.segment !== 'all' ? 1 : 0) + p.potentiel.length
    + p.refs_dn.length + p.refs_presentes.length + p.origines.length;

  // ── État replié ───────────────────────────────────────────────────────────
  if(!_planifFiltersOpen) {
    const hasSugg = d && (d.jours||[]).some(j=>j.suggestions.some(s=>!excl.has(s.id_hubspot)));
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 6px">
        <button onclick="_planifFiltersOpen=true;_planifEnsureStats();_planifRefresh()"
          title="Ouvrir le planificateur"
          style="background:rgba(var(--accent-rgb),.1);border:1px solid rgba(var(--accent-rgb),.2);cursor:pointer;padding:8px;border-radius:10px;color:var(--accent);display:flex;align-items:center;justify-content:center">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        </button>
        ${nbFiltres ? `<span style="font-size:9px;background:var(--accent);color:#fff;border-radius:8px;padding:1px 5px;text-align:center;font-weight:700">${nbFiltres}</span>` : ''}
        ${hasSugg ? `<span style="font-size:9px;background:var(--green);color:#fff;border-radius:8px;padding:2px 6px;text-align:center;font-weight:700">OK</span>` : ''}
        ${_planifState.loading ? `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" width="14" height="14" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>` : ''}
      </div>`;
  }

  // ── Chips helper ──────────────────────────────────────────────────────────
  const _chip = (val, arr, key, label) => {
    const active = arr.includes(val);
    const safe = val.replace(/'/g,'\\x27');
    return `<button onclick="_planifToggle('${key}','${safe}',${!active})"
      style="padding:2px 8px;border-radius:10px;cursor:pointer;font-size:11px;white-space:nowrap;
             ${active
               ? 'background:rgba(var(--accent-rgb),.15);border:1.5px solid var(--accent);color:var(--accent);font-weight:600'
               : 'background:transparent;border:1px solid var(--border);color:var(--text)'}">
      ${active?'✓ ':''}${label||val}
    </button>`;
  };

  // ── Résultats ─────────────────────────────────────────────────────────────
  const _jourLabel = _planifActiveJour
    ? (()=>{const d2=new Date(_planifActiveJour+'T12:00:00');return d2.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'});})()
    : null;

  let resultsHtml = '';
  if(_planifState.loading) {
    resultsHtml = `<div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
      ${[1,2,3,4,5].map(()=>`
        <div style="display:flex;align-items:center;gap:6px;padding:4px 0">
          <div class="sk" style="width:22px;height:22px;border-radius:50%;flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:4px">
            <div class="sk" style="height:10px;width:80%;border-radius:4px"></div>
            <div class="sk" style="height:8px;width:40%;border-radius:4px"></div>
          </div>
          <div class="sk" style="width:18px;height:18px;border-radius:4px;flex-shrink:0"></div>
        </div>`).join('')}
      <div style="text-align:center;color:var(--text-muted);font-size:10px;padding-top:4px">Analyse en cours… 15–30 s</div>
    </div>`;
  } else if(d) {
    // Filtrer les jours si activeJour défini
    const jours = _planifActiveJour
      ? (d.jours||[]).filter(j=>j.date_str===_planifActiveJour)
      : (d.jours||[]);
    const totalVis = jours.reduce((s,j)=>s+j.suggestions.filter(sg=>!excl.has(sg.id_hubspot)).length,0);
    if(!totalVis) {
      resultsHtml = `<div style="padding:12px;color:var(--text-muted);font-size:11px">Aucune suggestion${_planifActiveJour?' pour ce jour':''}.</div>`;
    } else {
      resultsHtml = `
        <div style="padding:6px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;font-weight:700;color:var(--accent)">${totalVis} suggestion${totalVis>1?'s':''}</span>
          ${_planifActiveJour?`<span style="font-size:10px;color:var(--text-muted)">${_jourLabel}</span>`:''}
          ${!_planifActiveJour?`<button class="btn btn-ghost btn-sm" style="margin-left:auto;font-size:10px;gap:4px" onclick="_planifAccepterTout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg> Tout</button>`:''}
          ${_planifActiveJour?`<button class="btn btn-ghost btn-sm" style="margin-left:auto;font-size:10px;gap:4px" onclick="_planifAccepterJour('${_planifActiveJour}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg> Tout</button>`:''}
        </div>
        <div>
        ${jours.map(jour => {
          const visibles = (jour.suggestions||[]).filter(s=>!excl.has(s.id_hubspot));
          if(!visibles.length) return '';
          return `
            ${!_planifActiveJour?`<div style="padding:5px 12px 2px;font-size:10px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;gap:4px">
              ${jour.nom} <span style="font-weight:400">${jour.credits_libre}pt libres</span>
              <button class="btn btn-primary btn-sm" style="font-size:9px;padding:2px 7px;margin-left:auto;display:flex;align-items:center;gap:3px"
                onclick="_planifAccepterJour('${jour.date_str}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="9" height="9"><polyline points="20 6 9 17 4 12"/></svg>
                Ajouter
              </button>

            ${visibles.map((s,i) => {
              const sid = `fp-${jour.date_str}-${i}`;
              const dnB = s.groupe_dn===0?`<span style="font-size:8px;color:#e74c3c;font-weight:700">DN●</span>`
                        : s.groupe_dn===1?`<span style="font-size:8px;color:#e67e22;font-weight:700">DN◑</span>`:'';
              const retB= s.is_retard?`<span style="font-size:8px;color:#e74c3c;font-weight:700">RET.</span>`
                        : s.is_proche?`<span style="font-size:8px;color:#e67e22;font-weight:700">BIENT.</span>`:'';
              const sc  = s.score>=100?'#e74c3c':s.score>=50?'#e67e22':'var(--text-muted)';
              return `
                <div id="${sid}" draggable="true"
                  ondragstart="_suggDragStart(event,'${jour.date_str}',${i})"
                  ondragend="_dragSugg=null"
                  style="padding:5px 12px;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--border);cursor:grab">
                  <span style="width:22px;height:22px;border-radius:50%;background:${sc}1a;border:2px solid ${sc};
