                  <div style="flex:1;min-width:0;overflow:hidden">
                    <div style="font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.nom}</div>
                    <div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap">
                      <span class="badge ${s.type_visite==='VC'?'bvc':'bvp'}" style="font-size:8px">${s.type_visite}</span>
                      ${retB}${dnB}
                    </div>
                  </div>
                  <button style="background:none;border:1px solid var(--border);border-radius:5px;padding:3px 6px;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0"
                    onclick="_planifIgnorer('${s.id_hubspot}')" title="Ignorer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="9" height="9"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>`;
            }).join('')}`;
        }).join('')}
        </div>`;
    }
  }

  // Déclencher le chargement des stats si besoin (villes + DN)
  _planifEnsureStats();

  // ── Formulaire filtres ─────────────────────────────────────────────────────
  const _dns_a = (_planifState._dn_activer_search || '').toLowerCase();
  const _dns_p = (_planifState._dn_pousser_search || '').toLowerCase();
  const _catalogue = (_planifState._stats && _planifState._stats.produits) || [];
  const _catA = _dns_a ? _catalogue.filter(r=>r.toLowerCase().includes(_dns_a)) : _catalogue;
  const _catP = _dns_p ? _catalogue.filter(r=>r.toLowerCase().includes(_dns_p)) : _catalogue;

  // Villes disponibles selon les depts sélectionnés
  const _vpd = (_planifState._stats && _planifState._stats.villes_par_dept) || {};
  const _villesDispo = p.departements.length
    ? p.departements.flatMap(dep => _vpd[dep] || []).filter((v,i,a)=>a.indexOf(v)===i).sort()
    : Object.values(_vpd).flat().filter((v,i,a)=>a.indexOf(v)===i).sort();
  const _vs = (_planifState._ville_search || '').toLowerCase();
  const _villesFiltrees = _vs ? _villesDispo.filter(v=>v.toLowerCase().includes(_vs)) : _villesDispo.slice(0,40);

  const formHtml = `
    <div style="padding:10px 12px;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Planificateur
        </span>
        <button onclick="_planifFiltersOpen=false;_planifRefresh()"
          style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;line-height:1;padding:2px">×</button>
      </div>

      <!-- Jour -->
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Jour</div>
        <div style="display:flex;gap:3px;flex-wrap:wrap">
          <button onclick="_planifActiveJour=null;_planifRefresh()"
            class="btn btn-sm ${!_planifActiveJour?'btn-primary':'btn-outline'}" style="font-size:10px;padding:2px 8px">
            Semaine
          </button>
          ${_buildWeekDays(_agendaOffset).map(wd => `
            <button onclick="_planifActiveJour='${wd.iso}';_planifRefresh()"
              class="btn btn-sm ${_planifActiveJour===wd.iso?'btn-primary':'btn-outline'}" style="font-size:10px;padding:2px 8px">
              ${wd.nom.slice(0,3)} ${wd.date.getDate()}
            </button>
          `).join('')}
        </div>
      </div>

      <!-- Depts -->
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Départements</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px">
          ${_PLANIF_DEPTS.map(d2 => _chip(d2, p.departements, 'departements')).join('')}
        </div>
      </div>

      <!-- Type compte -->
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Type compte</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${['all','clients','prospects'].map(seg=>`
            <button onclick="_planifState.p.segment='${seg}';_planifState.data=null;_planifRefresh()"
              class="btn btn-sm ${p.segment===seg?'btn-primary':'btn-outline'}" style="font-size:10px;padding:2px 8px">
              ${seg==='all'?'Tous':seg==='clients'?'Clients':'Prospects'}
            </button>`).join('')}
        </div>
      </div>

      <!-- Potentiel -->
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Potentiel</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px">
          ${_POTENTIEL_LIST.map(v => _chip(v, p.potentiel, 'potentiel', v==='Non Prioritaires'?'Non Prio.':v)).join('')}
        </div>
      </div>

      <!-- Villes -->
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">
          Villes ${p.villes.length?`<span style="color:var(--accent)">(${p.villes.length})</span>`:''}
          ${p.villes.length?`<button class="btn btn-ghost btn-sm" onclick="_planifState.p.villes=[];_planifState.data=null;_planifRefresh()"
            style="font-size:9px;padding:1px 5px;margin-left:4px">Effacer</button>`:''}
        </div>
        ${p.villes.length ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px">
          ${p.villes.map(v=>{const safe=v.replace(/'/g,'\\x27');return `<span style="padding:2px 7px;border-radius:8px;background:rgba(var(--accent-rgb),.15);border:1px solid var(--accent);font-size:10px;display:inline-flex;align-items:center;gap:4px">
            ${v}<span style="cursor:pointer;opacity:.6;font-size:12px" onclick="var i=_planifState.p.villes.indexOf('${safe}');if(i>=0){_planifState.p.villes.splice(i,1);_planifState.data=null;_planifRefresh()}">×</span>
          </span>`}).join('')}
        </div>` : ''}
        ${!_planifState._stats && _planifState._statsLoading ? `<div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">Chargement des villes…</div>` : ''}
        ${_planifState._stats && !_villesDispo.length && p.departements.length ? `<div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">Pas de données de ville pour ce dept — tapez pour chercher dans tous les depts</div>` : ''}
        <input type="text" placeholder="${_villesDispo.length?'Rechercher une ville…':'Tapez pour chercher…'}"
          value="${_planifState._ville_search||''}"
          oninput="_planifState._ville_search=this.value;_planifFillChips()"
          class="input" style="font-size:11px;margin-bottom:4px;padding:3px 7px">
        <div id="planif-villes-grid" style="display:flex;flex-wrap:wrap;gap:3px;max-height:60px;overflow-y:auto">
          <span style="font-size:10px;color:var(--text-muted)">Chargement…</span>
        </div>
      </div>

      <!-- DN activer -->
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">
          DN à activer ${p.refs_dn.length ? '(' + p.refs_dn.length + ')' : ''}
        </div>
        <input type="text" id="planif-dn-a-search" placeholder="Filtrer références…" value="${_planifState._dn_activer_search||''}"
          oninput="_planifState._dn_activer_search=this.value;_planifFillChips()"
          class="input" style="font-size:11px;margin-bottom:4px;padding:3px 7px">
        <div id="planif-dn-a-chips" style="display:flex;flex-wrap:wrap;gap:3px;max-height:80px;overflow-y:auto">
          <span style="font-size:10px;color:var(--text-muted)">Chargement…</span>
        </div>
      </div>

      <!-- DN pousser -->
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">
          DN à pousser ${p.refs_presentes.length ? '(' + p.refs_presentes.length + ')' : ''}
        </div>
        <input type="text" id="planif-dn-p-search" placeholder="Filtrer références…" value="${_planifState._dn_pousser_search||''}"
          oninput="_planifState._dn_pousser_search=this.value;_planifFillChips()"
          class="input" style="font-size:11px;margin-bottom:4px;padding:3px 7px">
        <div id="planif-dn-p-chips" style="display:flex;flex-wrap:wrap;gap:3px;max-height:80px;overflow-y:auto">
          <span style="font-size:10px;color:var(--text-muted)">Chargement…</span>
        </div>
      </div>

      <!-- Point départ -->
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Point de départ</div>
        <input type="text" placeholder="Istres…" value="${p.point_depart_ville}"
          oninput="_planifState.p.point_depart_ville=this.value"
          class="input" style="font-size:11px;padding:3px 7px">
      </div>

      ${nbFiltres ? `<button class="btn btn-ghost btn-sm" style="font-size:10px;width:100%;margin-bottom:6px" onclick="_planifResetFiltres()">Réinitialiser filtres</button>` : ''}

      <button onclick="_planifFetch()" class="btn btn-primary btn-sm" style="width:100%;justify-content:center;gap:6px">
        ${_planifState.loading
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Analyse…`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> Générer suggestions`}
      </button>
    </div>`;

  // Remplir les chips après le rendu du DOM
  setTimeout(_planifFillChips, 0);

  return formHtml + `<div id="planif-results">${resultsHtml}</div>`;
}

function _planifPanelFiltres() {
  _planifFiltersOpen = true;
  _planifRefresh();
}

// Remplit les chips DN et villes directement dans le DOM (sans re-render du panneau entier)
function _planifFillChips() {
  const stats = _planifState._stats;
  if(!stats) return;

  const produits = stats.produits || [];
  const p = _planifState.p;
  const searchA = (_planifState._dn_activer_search || '').toLowerCase();
  const searchP = (_planifState._dn_pousser_search || '').toLowerCase();

  function _chipHtml(r, arrKey) {
    const arr = p[arrKey];
    const sel = arr.includes(r);
    const safe = r.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const selStyle = 'background:rgba(249,115,22,.18);border:1.5px solid var(--accent);color:var(--accent);font-weight:700';
    const defStyle = 'background:transparent;border:1px solid var(--border);color:var(--text)';
    return '<button onclick="var a=_planifState.p.' + arrKey + ';var i=a.indexOf(\'' + safe + '\');if(i>=0)a.splice(i,1);else a.push(\'' + safe + '\');_planifState.data=null;_planifFillChips()" '
      + 'style="padding:2px 8px;border-radius:8px;cursor:pointer;font-size:10px;white-space:nowrap;' + (sel ? selStyle : defStyle) + '">'
      + (sel ? '✓ ' : '') + r + '</button>';
  }

  const chipsA = document.getElementById('planif-dn-a-chips');
  if(chipsA) {
    const filtA = searchA ? produits.filter(r=>r.toLowerCase().includes(searchA)) : produits;
    chipsA.innerHTML = filtA.length
      ? filtA.map(r => _chipHtml(r, 'refs_dn')).join('')
      : '<span style="font-size:10px;color:var(--text-muted)">Aucune référence</span>';
  }

  const chipsP = document.getElementById('planif-dn-p-chips');
  if(chipsP) {
    const filtP = searchP ? produits.filter(r=>r.toLowerCase().includes(searchP)) : produits;
    chipsP.innerHTML = filtP.length
      ? filtP.map(r => _chipHtml(r, 'refs_presentes')).join('')
      : '<span style="font-size:10px;color:var(--text-muted)">Aucune référence</span>';
  }

  // Villes
  const vpd = stats.villes_par_dept || {};
  const _villesAllDepts = Object.values(vpd).flat().filter((v,i,a)=>a.indexOf(v)===i).sort();
  const _villesDept = p.departements.length
    ? p.departements.flatMap(d => vpd[d] || []).filter((v,i,a)=>a.indexOf(v)===i).sort()
    : _villesAllDepts;
  const villesGrid = document.getElementById('planif-villes-grid');
  if(villesGrid) {
    const sv = (_planifState._ville_search || '').toLowerCase();
    // Quand l'utilisateur cherche, on cherche dans TOUTES les villes (pas seulement le dept)
    const pool = sv ? _villesAllDepts : _villesDept;
    const filtered = sv ? pool.filter(v=>v.toLowerCase().includes(sv)) : pool.slice(0,50);
    const disponibles = filtered.filter(v=>!p.villes.includes(v));
    villesGrid.innerHTML = disponibles.length
      ? disponibles.map(v=>{
          const safe=v.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return '<button onclick="_planifAddVille(\'' + safe + '\')" '
            + 'style="padding:2px 7px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:10px;color:var(--text);white-space:nowrap">' + v + '</button>';
        }).join('')
      : '<span style="font-size:10px;color:var(--text-muted)">Aucune ville trouvée</span>';
  }
}

// Assure que les stats sont chargées (villes + produits DN) — appelé à l'ouverture du panneau
function _planifEnsureStats() {
  if(_planifState._statsLoading || _planifState._statsFetched) return;
  _planifState._statsLoading = true;
  fetch('/api/stats').then(r=>r.json()).then(s=>{
    _planifState._stats = s;
    _planifState._statsFetched = true;
    _planifState._statsLoading = false;
    // Ne pas appeler _planifRefresh() ici : ça détruirait la saisie en cours
    // dans les barres de recherche. _planifFillChips() suffit pour mettre à jour
    // les chips villes et produits DN sans toucher au focus.
    _planifFillChips();
  }).catch(()=>{ _planifState._statsLoading = false; });
}

function _planifToggle(key, val, checked) {

// ── Compléter un jour spécifique ──────────────────────────────────────────────
async function _completerJour(dateIso) {
  _planifActiveJour = dateIso;
  _planifFiltersOpen = true;
  _planifEnsureStats();
  // Synchroniser la date du planif avec le lundi de ce jour
  const d = new Date(dateIso + 'T12:00:00');
  const dayIdx = d.getDay() === 0 ? 6 : d.getDay() - 1;
  const lundi = new Date(d);
  lundi.setDate(d.getDate() - dayIdx);
  _planifState.date_debut = _isoLocal(lundi);
  _planifState.loading = true;
  _planifState.exclus = _planifGetExclusPersistants();
  _planifRefresh();
  try {
    const payload = {
      mode: 'completer',
      date_debut: _planifState.date_debut,
      departements:  _planifState.p.departements,
      villes:        _planifState.p.villes,
      segment:       _planifState.p.segment,
      potentiel:     _planifState.p.potentiel,
      refs_dn:             _planifState.p.refs_dn,
      refs_presentes:      _planifState.p.refs_presentes,
      origines:            _planifState.p.origines,
      geo_optimise:        true,   // filtrage géographique du jour
      point_depart_ville:  _planifState.p.point_depart_ville || '',
    };
    const r = await fetch('/api/planificateur/suggestions', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    // Stocker les suggestions du jour dans _planifState.data
    _planifState.data = data;
    if(data && data.catalogue && data.catalogue.length) {
      if(!_planifState._stats) _planifState._stats = {};
      _planifState._stats.produits = data.catalogue;
    }
  } catch(e) {
    _planifState.data = {jours:[], total_suggestions:0};
  }
  _planifState.loading = false;
  _planifRefresh();
}

// ── Optimiser le trajet d'un jour (TSP) ──────────────────────────────────────
async function _optimiserJour(dateIso) {
  const btn = document.querySelector(`button[onclick*="_optimiserJour('${dateIso}')"]`);
  if(btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const r = await fetch('/api/agenda/optimiser-jour', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({date: dateIso}),
    });
    const res = await r.json();
    if(res.ok) {
      // Mettre à jour les heures des meetings via l'API update
      const updates = res.ordre || [];
      await Promise.all(updates.map(u =>
        fetch(`/api/agenda/meeting/${u.id}/update`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({heure: u.heure, duree_min: u.duree_min, type_visite: u.type_visite, date_str: dateIso}),
        })
      ));
      await _agendaRefreshAfterSave();
    } else {
      alert(res.error || 'Erreur optimisation trajet.');
      if(btn) { btn.disabled = false; btn.textContent = '🗺 Trajet'; }
    }
  } catch(e) {
    alert('Erreur réseau : ' + e.message);
    if(btn) { btn.disabled = false; btn.textContent = '🗺 Trajet'; }
  }
}

    };

      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });

    // Mettre à jour le catalogue dans les stats si retourné
    if(_planifState.data && _planifState.data.catalogue && _planifState.data.catalogue.length) {
      if(!_planifState._stats) _planifState._stats = {};
      _planifState._stats.produits = _planifState.data.catalogue;

    if(_planifState.data && _planifState.data.origines_disponibles) {

      _planifState._stats.origines = _planifState.data.origines_disponibles;
    }

  }
  _planifState.loading = false;
  _planifRefresh();
}


async function _planifAccepterJour(dateStr) {
  const jour = (_planifState.data.jours||[]).find(j=>j.date_str===dateStr);
  if(!jour) return;
  const visibles = jour.suggestions.filter(s=>!_planifState.exclus.has(s.id_hubspot));
  if(!visibles.length) return;
  const [h, mn] = (jour.debut||'09:00').split(':').map(Number);
  const offset = '+02:00';
  const visites = visibles.map((s,i)=>{
    const mins = h*60+mn+i*60;
    const hh = String(Math.floor(mins/60)).padStart(2,'0');
    const mm = String(mins%60).padStart(2,'0');
    return {dt_start:`${dateStr}T${hh}:${mm}:00${offset}`,type_visite:s.type_visite,
            pharmacie:{nom:s.nom,id_hubspot:s.id_hubspot,ville:s.ville,cp:s.cp}};
  });
  try {
    const r = await fetch('/api/creer',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({visites})});
    const res = await r.json();
    if(res.created>0) {
      visibles.forEach(s=>_planifState.exclus.add(s.id_hubspot));
      _planifRefresh();
      await _agendaRefreshAfterSave();
      showToast(`${res.created} meeting${res.created>1?'s':''} créé${res.created>1?'s':''} — ${jour.nom}`, 'success');
    } else { showToast('Erreur lors de la création des meetings.', 'error'); }
  } catch(e) { showToast('Erreur réseau : '+e.message, 'error'); }
}

async function _planifAccepterTout() {
  const d = _planifState.data;
  if(!d || !d.jours || !d.jours.length) return;
  const total = d.jours.reduce((s,j)=>s+j.suggestions.filter(sg=>!_planifState.exclus.has(sg.id_hubspot)).length,0);
  if(!total) return;
  if(!confirm(`Créer ${total} meeting${total>1?'s':''} sur toute la semaine ?`)) return;
  const offset = '+02:00';
  const visites = [];
  for(const jour of d.jours) {
    const visibles = jour.suggestions.filter(s=>!_planifState.exclus.has(s.id_hubspot));
    const [h, mn] = (jour.debut||'09:00').split(':').map(Number);
    visibles.forEach((s,i)=>{
      const mins = h*60+mn+i*60;
      const hh = String(Math.floor(mins/60)).padStart(2,'0');
      const mm = String(mins%60).padStart(2,'0');
      visites.push({dt_start:`${jour.date_str}T${hh}:${mm}:00${offset}`,type_visite:s.type_visite,
                    pharmacie:{nom:s.nom,id_hubspot:s.id_hubspot,ville:s.ville,cp:s.cp}});
    });
  }
  try {
    const r = await fetch('/api/creer',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({visites})});
    const res = await r.json();
    if(res.created>0) {
      d.jours.forEach(j=>j.suggestions.forEach(s=>_planifState.exclus.add(s.id_hubspot)));
      _planifRefresh();
      await _agendaRefreshAfterSave();
      showToast(`${res.created} meeting${res.created>1?'s':''} créé${res.created>1?'s':''} sur la semaine`, 'success');
    } else { showToast('Erreur lors de la création des meetings.', 'error'); }
  } catch(e) { showToast('Erreur réseau : '+e.message, 'error'); }
}

async function _planifQuickStart(type) {
  _planifResetFiltres();
  if(type === 'trajet') {
    _planifState.mode = 'optimiser';
    _planifState.p.geo_optimise = true;
  } else if(type === 'clients') {
    _planifState.mode = 'completer';
    _planifState.p.segment = 'clients';
    _planifState.p.potentiel = ['Prioritaires','Secondaires','Non Prioritaires'];
  } else if(type === 'prospects') {
    _planifState.mode = 'completer';
    _planifState.p.segment = 'prospects';
    _planifState.p.potentiel = ['Prioritaires','Secondaires','Non Prioritaires'];
  } else {
    _planifState.mode = 'completer';
  }
  await _planifFetch();
}

async function renderVisiter(params={}) {
  // If a meetingId is provided, go straight to brief
  if(params.meetingId) { navigate('brief', params); return; }

  // Default: show today's visits + CR backlog tabs
  try {
    const td = S.cache['today'] || await api('/api/today');
    S.cache['today'] = td;
    const meetings = (td.today_meetings || []);
    const crManquants = td.cr_manquants || [];
    const scheduled = meetings.filter(m => (m.outcome || 'SCHEDULED') === 'SCHEDULED');
    const completed = meetings.filter(m => m.outcome === 'COMPLETED');

    const tab = params._vTab || (crManquants.length && !scheduled.length ? 'cr' : 'brief');

    const tabHtml = (id, label, count) => {
      const active = tab === id;
      const badge = count ? `<span style="background:${active?'rgba(255,255,255,.25)':'var(--accent)'};color:#fff;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:5px">${count}</span>` : '';
      return `<button onclick="navigate('visiter',{_vTab:'${id}'})" style="flex:1;padding:9px 0;border:none;border-radius:var(--r-xl);font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;${active?'background:var(--accent);color:#fff':'background:transparent;color:var(--text-muted)'}">${label}${badge}</button>`;
    };

    const tabsHtml = `
      <div style="display:flex;gap:6px;background:var(--surface2);padding:5px;border-radius:var(--r-2xl);margin-bottom:20px">
        ${tabHtml('brief', 'Brief visite', scheduled.length)}
        ${tabHtml('cr', 'Comptes-rendus', crManquants.length)}
      </div>`;

    if(tab === 'brief') {
      if(!scheduled.length) {
        setContent(`${tabsHtml}<div class="empty">Aucun rendez-vous planifié — consultez l'agenda pour organiser vos visites</div>`);
        return;
      }
      const listHtml = scheduled.map(m => {
        const type = (m.type||'').toUpperCase();
        const btype = ['VC','RC','F'].includes(type) ? 'bvc' : 'bvp';
        return `<div class="meeting-item">
          <div class="meeting-badges">
            <span class="badge bdark">${m.heure||'–'}</span>
            <span class="badge ${btype}">${type}</span>
            <span class="badge bamber">Planifié</span>
          </div>
          <div class="row-sb">
            <div>
              <div class="meeting-name">${m.company_nom||m.titre||'–'}</div>
              <div class="small muted" style="margin-top:2px">${m.city||''}</div>
            </div>
            ${m.company_id && S.hub_id ? `<a href="https://app.hubspot.com/contacts/${S.hub_id}/company/${m.company_id}" target="_blank" class="btn btn-ghost btn-xs">↗</a>` : ''}
          </div>
          <div class="meeting-btns">
            <button class="btn btn-primary btn-sm" onclick="navigate('brief',{meetingId:'${m.id}'})">Brief →</button>
            <button class="btn btn-outline btn-sm" onclick="navigate('cr',{meetingId:'${m.id}',companyId:'${m.company_id||''}',companyNom:'${(m.company_nom||m.titre||'').replace(/'/g,"\\'")}',meetingType:'${(m.type||'').toUpperCase()}' })">CR</button>
            <button class="btn btn-outline btn-sm" onclick="navigate('commandes',{companyId:'${m.company_id||''}',companyNom:'${(m.company_nom||m.titre||'').replace(/'/g,"\\'")}' })" ${m.company_id?'':'disabled'}>Commande</button>
          </div>
        </div>`;
      }).join('');
      setContent(`${tabsHtml}${listHtml}`);

    } else {
      // CR tab — reuse renderPostVisite logic
      await renderPostVisite(_extraHtml => tabsHtml + _extraHtml);
    }
  } catch(e) {
    setContent('<div class="empty">Erreur chargement</div>');
  }
}

async function renderPostVisite(wrapFn) {
  try {
    const today    = _isoLocal(new Date());
    const sevenAgo = _isoLocal(new Date(Date.now()-7*864e5));
    const d = await loadModule('post_visite', `/api/post-rdv?date_from=${sevenAgo}&date_to=${today}`);
    const all = [...(d.sans_note||[]), ...(d.sans_photo||[]), ...(d.completes||[])];

    if(!all.length) {
      const msg = '<div class="empty">Aucun rendez-vous sur les 7 derniers jours</div>';
      setContent(wrapFn ? wrapFn(msg) : msg);
      return;
    }

    const byDay = {};
    all.forEach(m => {
      const day = (m.dt||'').split('T')[0];
      if(!byDay[day]) byDay[day]=[];
      byDay[day].push(m);
    });

    const OUTCOMES = {
      COMPLETED:{label:'Terminé',cls:'bgreen'},
      RESCHEDULED:{label:'Replanifié',cls:'bamber'},
      NO_SHOW:{label:'Absent',cls:'bred'},
      CANCELED:{label:'Annulé',cls:'bred'},
    };

    // ── Résumé décisionnel ───────────────────────────────────────────────
    const sansCR   = all.filter(m => !m.has_note && m.outcome !== 'CANCELED');
    const absents  = all.filter(m => m.outcome === 'NO_SHOW');
    const termines = all.filter(m => m.outcome === 'COMPLETED' && m.has_note);
    let resumeHtml;
    if(sansCR.length) {
      resumeHtml = `<div class="card" style="border-left:3px solid #e74c3c;margin-bottom:16px">
        <div class="card-header" style="padding-bottom:10px">
          <div class="card-title" style="font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:#e74c3c">Action requise</div>
        </div>
        <div class="card-body space" style="padding-top:0;gap:8px">
          <div>
            <div class="fw6">${sansCR.length} CR manquant${sansCR.length>1?'s':''}</div>
            <div class="small muted" style="margin-top:2px">${sansCR.map(m=>m.company_nom||m.titre).join(', ')}</div>
          </div>
          <div class="row" style="gap:6px;flex-wrap:wrap">
            ${sansCR.slice(0,3).map(m=>`
              <button onclick="navigate('cr',{meetingId:'${m.id}',companyId:'${m.company_id||''}',companyNom:'${(m.company_nom||m.titre||'').replace(/'/g,"\\'")}',meetingType:'${(m.type||'').toUpperCase()}'})" class="btn btn-primary btn-sm">${m.company_nom||m.titre||'CR'}</button>`).join('')}
          </div>
        </div>
      </div>`;
    } else {
      resumeHtml = `<div style="padding:10px 14px;border-radius:10px;background:#d4edda;color:#155724;font-size:12px;font-weight:700;margin-bottom:16px">
        ✓ Tous les CR sont saisis — ${termines.length} visite${termines.length>1?'s':''} clôturée${termines.length>1?'s':''}
      </div>`;
    }

    const html = Object.keys(byDay).sort().reverse().map(day => {
      const label = new Date(day+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
      const items = byDay[day].map(m => {
        const o = OUTCOMES[m.outcome] || {label:'Planifié',cls:'boutline'};
        const isVC = ['VC','RC','F'].includes((m.type||'').toUpperCase());
        const hasNote = !!m.has_note;

        // Prochaine étape recommandée
        let nextStep, nextStepCta, nextStepFn;
        if(!hasNote && m.outcome !== 'CANCELED') {
          nextStep    = 'Saisir le compte-rendu';
          nextStepCta = 'Rédiger le CR';
          nextStepFn  = `navigate('cr',{meetingId:'${m.id}',companyId:'${m.company_id||''}',companyNom:'${(m.company_nom||m.titre||'').replace(/'/g,"\\'")}',meetingType:'${(m.type||'').toUpperCase()}' })`;
        } else if(m.outcome === 'NO_SHOW') {
          nextStep    = 'Absent — replanifier la visite';
          nextStepCta = 'Voir l\'agenda';
          nextStepFn  = `navigate('agenda')`;
        } else if(isVC && hasNote) {
          nextStep    = 'Prise de commande ou extension gamme';
          nextStepCta = 'Créer une commande';
          nextStepFn  = `navigate('commandes',{companyId:'${m.company_id||''}',companyNom:'${(m.company_nom||m.titre||'').replace(/'/g,"\\'")}' })`;
        } else if(hasNote) {
          nextStep    = 'Planifier le prochain passage';
          nextStepCta = 'Voir l\'agenda';
          nextStepFn  = `navigate('agenda')`;
        } else {
          nextStep    = null;
        }

        const noteEncoded = m.last_note_text ? encodeURIComponent(m.last_note_text) : '';
        const editBtn = `<button onclick="navigate('cr',{meetingId:'${m.id}',companyId:'${m.company_id||''}',companyNom:'${(m.company_nom||m.titre||'').replace(/'/g,"\\'")}',meetingType:'${(m.type||'').toUpperCase()}',existingOutcome:'${m.outcome||'COMPLETED'}',existingNote:decodeURIComponent('${noteEncoded}')})" class="btn btn-outline btn-xs" style="margin-left:auto">${hasNote ? '✏️ Modifier' : '📝 Rédiger CR'}</button>`;

        return `<div class="meeting-item">
          <div class="meeting-badges" style="align-items:center">
            <span class="badge bdark">${m.heure||'–'}</span>
            <span class="badge ${isVC?'bvc':'bvp'}">${m.type||'?'}</span>
            <span class="badge ${o.cls}">${o.label}</span>
            ${hasNote ? '<span class="badge bgreen" style="font-size:10px">✓ CR</span>' : '<span class="badge bred" style="font-size:10px">CR manquant</span>'}
            ${editBtn}
          </div>
          <div class="meeting-name">${m.company_nom||m.titre||'–'}</div>
          ${m.last_note_text ? (()=>{const t=(m.last_note_text||'').replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();return `<div class="inset small muted" style="margin-top:6px;white-space:pre-wrap">${t.slice(0,150)}${t.length>150?'…':''}</div>`;})() : ''}
          ${nextStep ? `
          <div style="margin-top:8px;padding:8px 10px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;gap:8px">
            <div class="small muted" style="flex:1">${nextStep}</div>
            <button onclick="${nextStepFn}" class="btn btn-sm btn-primary" style="white-space:nowrap">${nextStepCta}</button>
          </div>` : ''}
        </div>`;
      }).join('');
      return `<div style="margin-bottom:20px">
        <div class="label" style="margin-bottom:8px">${label.charAt(0).toUpperCase()+label.slice(1)}</div>
        ${items}
      </div>`;

    // ── Prochaines actions ouvertes ──────────────────────────────────────

// ── Helpers partagés ──────────────────────────────────────────────────────
function _crToggle(id) {
  const el = document.getElementById(id);
  if(!el) return;
  const active = el.dataset.val === '1';
  el.dataset.val = active ? '0' : '1';
  el.style.background    = active ? 'var(--surface2)' : 'var(--accent)';
  el.style.color         = active ? 'var(--text)'     : '#fff';
  el.style.borderColor   = active ? 'var(--border)'   : 'var(--accent)';
}

function _parseCRNote(text) {
  if(!text) return {};
  const r = {};
  const lines = text.split('\n');
  const first = lines[0] || '';
  // Flags client
  r.commande    = first.includes('Commande prise')    || text.includes('Commande : Oui');
  r.precommande = first.includes('Précommande');
  r.formation   = first.includes('Formation')         || text.includes('Formation : Oui');
  r.offres      = first.includes('Offres présentées');
  r.nouveautes  = first.includes('Nouveautés');
  const fmDet   = first.match(/Formation \(([^)]+)\)/);
  r.formation_detail = fmDet ? fmDet[1] : '';
  // 4P
  const _pick = pfx => lines.find(l=>l.startsWith(pfx))?.slice(pfx.length).trim() || '';
  r['4p_prix']    = _pick('€ Prix: ');
  r['4p_place']   = _pick('📍 Place: ');
  r['4p_produit'] = _pick('📦 Produit: ');
  r['4p_promo']   = _pick('🏷 Promo: ');
  r.retours       = _pick('Retours: ');
  r.decisions     = _pick('Décisions: ');
  r.engagement    = _pick('Engagement: ');
  const bilanL    = lines.find(l=>l.startsWith('Objectif RDV: '));
  r.bilan_rdv     = bilanL?.includes('Atteint') ? 'oui' : bilanL?.includes('Partiellement') ? 'partiel' : bilanL ? 'non' : '';
  // Flags prospect
  const interloL  = lines.find(l=>l.startsWith('👤 '));
  const interloV  = interloL?.replace('👤 ','').trim() || '';
  r.interlocuteur = ['Pharmacien','Responsable achat'].includes(interloV) ? interloV : interloV ? 'Autre' : '';
  r.interlocuteur_autre = r.interlocuteur==='Autre' ? interloV : '';
  r.interet         = first.includes('Intérêt: Chaud') ? 'Chaud' : first.includes('Intérêt: Tiède') ? 'Tiède' : first.includes('Intérêt: Froid') ? 'Froid' : '';
  r.colis           = first.includes('Colis laissé');
  r.rdv_obtenu      = first.includes('RDV obtenu');
  r.implantation    = first.includes('Implantation');
  const rdvM        = first.match(/RDV obtenu \((\d{4}-\d{2}-\d{2})(?: (\d{2}:\d{2}))?\)/);
  r.rdv_date        = rdvM?.[1] || '';
  r.rdv_time        = rdvM?.[2] || '';
  r.qualification   = first.includes('🟢 Prioritaire') ? 'prioritaire' : first.includes('🟡 À suivre') ? 'a_suivre' : first.includes('🔴 Écarter') ? 'ecarter' : '';
  const delaiM      = first.match(/Retour dans: ([^·]+)/);
  r.delai           = delaiM?.[1]?.trim() || '';
  const groupM      = first.match(/Groupement: ([^·]+)/);
  r.groupement      = groupM?.[1]?.trim() || '';
  r.concurrence     = first.includes('Concurrence: ');
  const concM       = first.match(/Concurrence: ([^·]+)/);
  r.concurrence_detail = concM?.[1]?.trim() === 'Oui' ? '' : concM?.[1]?.trim() || '';
  // Note libre = lignes sans préfixes connus
  const SKIP_PFX = ['€ ','📍','📦','🏷','👤','Retours:','Décisions:','Engagement:','Objectif RDV:','💬 '];
  const FLAG_KW  = ['Commande','Précommande','Formation','Offres','Nouveautés','Intérêt:','Colis','RDV obtenu','Implantation','Qualification:','Retour dans:','Groupement:','Concurrence:'];
  const noteLines = lines.filter((l,i) => {
    if(i===0 && FLAG_KW.some(k=>l.includes(k))) return false;
    if(SKIP_PFX.some(p=>l.startsWith(p))) return false;
    return l.trim() !== '';
  });
  const legacyNote = lines.find(l=>l.startsWith('💬 '))?.replace('💬 ','').trim() || '';
  r.note = legacyNote || noteLines.join('\n').trim();
  return r;
}

// ── Helpers style toggles CR ───────────────────────────────────────────────
function _crBtnStyle(el, active) {
  if(!el) return;
  el.style.background  = active ? 'var(--accent)' : 'var(--surface2)';
  el.style.color       = active ? '#fff'          : 'var(--text)';
  el.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
}

function _crProspect(which) {
  const ids = { interesse:'togInteresse', pas_interesse:'togPasInteresse' };
  const other = which === 'interesse' ? 'pas_interesse' : 'interesse';
  const el      = document.getElementById(ids[which]);
  const otherEl = document.getElementById(ids[other]);
  if(!el) return;
  const nowActive = el.dataset.val !== '1';
  el.dataset.val = nowActive ? '1' : '0';
  _crBtnStyle(el, nowActive);
  if(otherEl) { otherEl.dataset.val = '0'; _crBtnStyle(otherEl, false); }
  const wrap = document.getElementById('crRefusWrap');
  if(wrap) wrap.style.display = (which === 'pas_interesse' && nowActive) ? 'flex' : 'none';
  // Si pas intéressé désactivé, reset raisons
  if(which === 'pas_interesse' && !nowActive) {
    document.querySelectorAll('[data-raison]').forEach(b => { b.dataset.selected='0'; _crBtnStyle(b,false); });
  }
}

function _crRaisonSelect(btn) {
  const alreadyOn = btn.dataset.selected === '1';
  document.querySelectorAll('[data-raison]').forEach(b => { b.dataset.selected='0'; _crBtnStyle(b,false); });
  if(!alreadyOn) { btn.dataset.selected='1'; _crBtnStyle(btn,true); }
}

function _crInterloChange(val) {
  const el = document.getElementById('crInterloAutre');
  if(el) el.style.display = val === 'Autre' ? 'block' : 'none';
}
function _crConcurrenceChange() {
  setTimeout(() => {
    const on = document.getElementById('togConcurrence')?.dataset.val === '1';
    const el = document.getElementById('crConcurrenceDetail');
    if(el) el.style.display = on ? 'block' : 'none';
  }, 0);
}

function _crDelaiOptions(qualif, selected) {
  const opts = qualif === 'prioritaire' ? ['1 semaine','2 semaines','1 mois'] : ['1 mois','3 mois'];
  return opts.map(v=>`
    <button class="cr-delai" data-val="${v}" data-active="${selected===v?'1':'0'}"
      onclick="_crBtnGroup('cr-delai','${v}')"
      style="padding:7px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;
        transition:all .12s;border:1px solid ${selected===v?'var(--accent)':'var(--border)'};
        background:${selected===v?'var(--accent)':'var(--surface2)'};
        color:${selected===v?'#fff':'var(--text)'}">
      ${v}
    </button>`).join('');
}

function _crQualif(val) {
  const colors = {prioritaire:'#27ae60', a_suivre:'#f39c12', ecarter:'#e74c3c'};
  document.querySelectorAll('.cr-qualif').forEach(b => {
    const active = b.dataset.val === val;
    const c = colors[b.dataset.val] || 'var(--accent)';
    b.style.background  = active ? c+'22'          : 'var(--surface2)';
    b.style.borderColor = active ? c               : 'var(--border)';
    b.style.color       = active ? c               : 'var(--text)';
    b.dataset.active    = active ? '1' : '0';
  });
  const wrap   = document.getElementById('crDelaiWrap');
  const optsEl = document.getElementById('crDelaiOpts');
  if(!wrap || !optsEl) return;
  if(val === 'ecarter') { wrap.style.display = 'none'; }
  else { wrap.style.display = 'block'; optsEl.innerHTML = _crDelaiOptions(val, null); }
}

function _crToggleRdvObtenu() {
  const el = document.getElementById('togRdvObtenu');
  if(!el) return;
  const nowActive = el.dataset.val !== '1';
  el.dataset.val = nowActive ? '1' : '0';
  _crBtnStyle(el, nowActive);
  const wrap = document.getElementById('rdvObtenuWrap');
  if(wrap) wrap.style.display = nowActive ? 'grid' : 'none';
}

// ── crSubmit unifié ───────────────────────────────────────────────────────
async function crSubmit(meetingId, companyId, companyNom, crType) {
  const outcome   = document.querySelector('input[name="crOutcome"]:checked')?.value || 'COMPLETED';
  const note      = document.getElementById('crNote')?.value?.trim() || '';
  const next_date = document.getElementById('crNextDate')?.value || '';
  const next_time = document.getElementById('crNextTime')?.value || '';
  const next_type = document.querySelector('input[name="crNextType"]:checked')?.value || 'VC';

  const lines = [];

  if(crType === 'prospect') {
    const interlo    = document.querySelector('.cr-interlo[data-active="1"]')?.dataset.val || '';
    const interloA   = document.getElementById('crInterloAutre')?.value?.trim() || '';
    const interet    = document.querySelector('.cr-interet[data-active="1"]')?.dataset.val || '';
    const colis        = document.getElementById('togColis')?.dataset.val        === '1';
    const rdvObtenu    = document.getElementById('togRdvObtenu')?.dataset.val    === '1';
    const implantation = document.getElementById('togImplantation')?.dataset.val === '1';
    const rdvDate    = document.getElementById('crRdvDate')?.value || '';
    const rdvTime    = document.getElementById('crRdvTime')?.value || '';
    const qualif     = document.querySelector('.cr-qualif[data-active="1"]')?.dataset.val || '';
    const delai      = document.querySelector('.cr-delai[data-active="1"]')?.dataset.val  || '';
    const groupement = document.getElementById('crGroupement')?.value?.trim() || '';
    const concurr    = document.getElementById('togConcurrence')?.dataset.val === '1';
    const concurrD   = document.getElementById('crConcurrenceDetail')?.value?.trim() || '';

    const flags = [
      interlo ? `👤 ${interlo==='Autre'&&interloA?interloA:interlo}` : null,
      interet  ? `Intérêt: ${interet}` : null,
      colis        ? 'Colis laissé' : null,
      rdvObtenu    ? `RDV obtenu${rdvDate?' ('+rdvDate+(rdvTime?' '+rdvTime:'')+')'  :''}` : null,
      implantation ? 'Implantation' : null,
      qualif   ? `Qualification: ${qualif==='prioritaire'?'🟢 Prioritaire':qualif==='a_suivre'?'🟡 À suivre':'🔴 Écarter'}` : null,
      delai    ? `Retour dans: ${delai}` : null,
      groupement?`Groupement: ${groupement}` : null,
      concurr  ? `Concurrence: ${concurrD||'Oui'}` : null,
    ].filter(Boolean);
    if(flags.length) lines.push(flags.join(' · '));
    if(note) lines.push(note);

  } else {
    const p4 = {
      prix:    document.getElementById('cr4p_prix')?.value?.trim()    || '',
      place:   document.getElementById('cr4p_place')?.value?.trim()   || '',
      produit: document.getElementById('cr4p_produit')?.value?.trim() || '',
      promo:   document.getElementById('cr4p_promo')?.value?.trim()   || '',
    };
    const offres      = document.getElementById('togOffres')?.dataset.val     === '1';
    const nouveautes  = document.getElementById('togNouveautes')?.dataset.val  === '1';
    const precommande = document.getElementById('togPrecommande')?.dataset.val === '1';
    const formation   = document.getElementById('togFormation')?.dataset.val   === '1';
    const formDet     = document.getElementById('crFormationDetail')?.value?.trim() || '';
    const retours     = document.getElementById('crRetours')?.value?.trim()    || '';
    const commande    = document.getElementById('togCommande')?.dataset.val    === '1';

    const flags = [
      commande    ? 'Commande prise'       : null,
      precommande ? 'Précommande évoquée'  : null,
      formation   ? `Formation${formDet?' ('+formDet+')':''}` : null,
      offres      ? 'Offres présentées'    : null,
      nouveautes  ? 'Nouveautés abordées'  : null,
    ].filter(Boolean);
    if(flags.length) lines.push(flags.join(' · '));

    if(p4.prix)    lines.push(`€ Prix: ${p4.prix}`);
    if(p4.place)   lines.push(`📍 Place: ${p4.place}`);
    if(p4.produit) lines.push(`📦 Produit: ${p4.produit}`);
    if(p4.promo)   lines.push(`🏷 Promo: ${p4.promo}`);
    if(retours)    lines.push(`Retours: ${retours}`);

    if(crType === 'rdv') {
      const bilan      = document.querySelector('.cr-bilan[data-active="1"]')?.dataset.val || '';
      const decisions  = document.getElementById('crDecisions')?.value?.trim()  || '';
      const engagement = document.getElementById('crEngagement')?.value?.trim() || '';
      if(bilan)      lines.push(`Objectif RDV: ${bilan==='oui'?'Atteint':bilan==='partiel'?'Partiellement':'Non atteint'}`);
      if(decisions)  lines.push(`Décisions: ${decisions}`);
      if(engagement) lines.push(`Engagement: ${engagement}`);
    }
    if(note) lines.push(note);
  }

  const note_body = lines.join('\n') || '—';

  // Statuts actions précédentes
  const actionUpdates = [];
  document.querySelectorAll('#crActionsWrap [data-selected-status]').forEach(el => {
    const s  = el.dataset.selectedStatus;
    const id = el.dataset.actionId;
    if(s && id) actionUpdates.push({id: parseInt(id), status: s});
  });

  // Nouvelles actions terrain
  const newActions = [];
  document.querySelectorAll('#crActionsNewWrap > div').forEach(div => {
    const t = div.querySelector('.cr-new-action-type')?.value || '';
    const d = div.querySelector('.cr-new-action-date')?.value || '';
    if(t && d) newActions.push({action_type: t, due_date: d});
  });

  const photoImgs = Array.from(document.querySelectorAll('#crPhotoGrid img'));

  const fields = {
    meeting_id: meetingId, outcome,
    company_id: companyId, company_nom: companyNom,
    note_body, next_date, next_time, next_type,
    action_type: newActions[0]?.action_type || '',
    action_due:  newActions[0]?.due_date    || '',
    action_note: '',
    action_impacts_planning: newActions.length > 0 ? 'true' : '',
  };

  const btn = document.getElementById('crSubmitBtn');
  if(btn) { btn.disabled = true; btn.textContent = 'Envoi…'; }

  if(!navigator.onLine) {
    queueAdd({...fields, _label: companyNom,
              _photosData: photoImgs.map(img=>({data:img.src,name:img.dataset.filename||'photo.jpg'}))});
    delete S.cache['post_visite']; delete S.cache['today'];
    navigate('sync');
    return;
  }

  try {
    // Mise à jour des statuts d'actions précédentes
    await Promise.all(actionUpdates.map(u =>
      api(`/api/actions/${u.id}/status`, {method:'POST', body:JSON.stringify({status:u.status})})
    ));
    // Actions supplémentaires (>1) créées via endpoint dédié
    for(const a of newActions.slice(1)) {
      await api('/api/actions/new', {
        method:'POST',
        body: JSON.stringify({...a, company_id: companyId, impacts_planning: true})
      }).catch(()=>{});
    }

    const fd = new FormData();
    Object.entries(fields).forEach(([k,v]) => { if(v!==null&&v!==undefined&&v!=='') fd.append(k,v); });
    for(let i=0;i<photoImgs.length;i++) {
      const blob = await fetch(photoImgs[i].src).then(r=>r.blob());
      fd.append('photos', blob, photoImgs[i].dataset.filename||`photo_${i+1}.jpg`);
    }

    const r   = await fetch(`/api/post-rdv/${meetingId}/submit`, {method:'POST', body:fd});
    const res = await r.json().catch(()=>({}));

    if(r.ok && res.ok) {
      delete S.cache['post_visite']; delete S.cache['today'];
      navigate('visiter');
    } else {
      queueAdd({...fields, _label:companyNom,
                _photosData: photoImgs.map(img=>({data:img.src,name:img.dataset.filename||'photo.jpg'})),
                _error: res.error||'Erreur serveur'});
      navigate('sync');
    }
  } catch(e) {
    queueAdd({...fields, _label:companyNom,
              _photosData: photoImgs.map(img=>({data:img.src,name:img.dataset.filename||'photo.jpg'}))});
    navigate('sync');
  }
}

function _crPhotosSelected(input) {
  const files = Array.from(input.files || []);
  if(!files.length) return;
  const grid = document.getElementById('crPhotoGrid');
  const status = document.getElementById('crPhotoStatus');
  // Ajouter chaque fichier à la grille (sans effacer les précédents)
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:relative;width:90px;height:90px;flex-shrink:0';
      const img = document.createElement('img');
      img.src = e.target.result;
      img.style.cssText = 'width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--border)';
      img.dataset.filename = file.name;
      const del = document.createElement('button');
      del.type = 'button';
      del.textContent = '×';
      del.style.cssText = 'position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center';
      del.onclick = () => { wrap.remove(); _crPhotosUpdateStatus(); };
      wrap.appendChild(img); wrap.appendChild(del);
      grid.appendChild(wrap);
      _crPhotosUpdateStatus();
    };
    reader.readAsDataURL(file);
  });
  // Reset input pour permettre de re-sélectionner les mêmes fichiers
  input.value = '';
}

function _crPhotosUpdateStatus() {
  const n = document.getElementById('crPhotoGrid')?.children.length || 0;
  const status = document.getElementById('crPhotoStatus');
  if(status) {
    status.textContent = n ? `${n} photo${n>1?'s':''} ajoutée${n>1?'s':''}` : 'Aucune photo';
    status.style.color = n ? 'var(--accent)' : 'var(--text-muted)';
  }
}
function _crPhotoRemove() { // kept for queue compat
  const grid = document.getElementById('crPhotoGrid');
  if(grid) grid.innerHTML = '';
  _crPhotosUpdateStatus();
}

function _fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload  = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

async function pharmSearch(q) {
  const dd  = document.getElementById('pharmDropdown');
  const inp = document.getElementById('pharmSearchInput');
  if(!dd || !inp) return;
  if(q.length < 2) { dd.style.display = 'none'; return; }
  // Positionner en fixed sous l'input
  const rect = inp.getBoundingClientRect();
  dd.style.top  = (rect.bottom + 4) + 'px';
  dd.style.left = rect.left + 'px';
  try {
    const r = await api(`/api/pharmacies/search?q=${encodeURIComponent(q)}&limit=15`);
    if(!r.results?.length) { dd.style.display = 'none'; return; }
    dd.style.display = 'block';
    dd.innerHTML = r.results.map(p => `
      <div onmousedown="pharmSelect('${p.id_hubspot}','${(p.nom||'').replace(/'/g,"\\'")}')"
           style="padding:8px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s"
           onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
        <div class="fw6" style="font-size:12px">${p.nom||'–'}</div>
        <div class="muted" style="font-size:11px">${p.ville||''} ${p.cp||''} ${p.is_client?'<span class="badge bvc" style="font-size:9px;padding:1px 5px">Client</span>':''}</div>
      </div>`).join('');
  } catch(e) { console.error('pharmSearch', e); }
}

async function orderPreselect(companyId, companyNom, btnEl) {
  document.querySelectorAll('[id^="rdvBtn_"]').forEach(b => b.className = 'btn btn-sm btn-outline');
  if(btnEl) btnEl.className = 'btn btn-sm btn-primary';

  const banner = document.getElementById('selectedCompanyBanner');
  const nameEl = document.getElementById('selectedCompanyName');
  const hint   = document.getElementById('noCompanyHint');
  if(banner) banner.style.display = 'flex';
  if(nameEl) nameEl.textContent = companyNom.split('–')[0].trim();
  if(hint)   hint.style.display = 'none';

  _order.company_id  = companyId;
  _order.company_nom = companyNom;
  _order.remise_auto = 0;
  _order.is_client   = false;
  _order.cart        = {};

  try {
    const c = await api(`/api/company/${companyId}`);
    const isClient = ['true','1','oui','rétrocession','retrocession'].includes((c.client_naali||'').toLowerCase());
    const remise   = parseFloat((c.remise||'').toString().replace(',','.')) || 0;
    _order.is_client   = isClient;
    _order.remise_auto = isClient ? remise : 0;
    const infoEl = document.getElementById('orderRemiseInfo');
    if(infoEl) {
      if(isClient && remise > 0) {
        infoEl.style.display = 'block';
        infoEl.innerHTML = `<span class="badge bgreen" style="font-size:11px">Remise client appliquée : ${remise}%</span>`;
      } else {
        infoEl.style.display = 'none';
      }
    }
  } catch(e) { console.error('orderPreselect remise', e); }

  cartRender();
  catRender();
}

function orderClearCompany() {
  _order = { company_id: '', company_nom: '', cart: {}, remise_auto: 0, is_client: false };
  document.querySelectorAll('[id^="rdvBtn_"]').forEach(b => b.className = 'btn btn-sm btn-outline');
  const banner = document.getElementById('selectedCompanyBanner');
  const hint   = document.getElementById('noCompanyHint');
  const infoEl = document.getElementById('orderRemiseInfo');
  if(banner)  banner.style.display = 'none';
  if(hint)    hint.style.display   = 'inline';
  if(infoEl)  infoEl.style.display = 'none';
  catRender();
  cartRender();
}


// ── Catalogue ──────────────────────────────────────────────────────────────

function catSetTab(tab) {
  _catTab = tab;
  document.getElementById('catSearch').value = '';
  _catSearch = '';
  ['Normal','UG','PLV'].forEach(t => {
    const btn = document.getElementById(`catTab_${t}`);
    if(btn) { btn.className = `btn btn-sm ${t===tab?'btn-primary':'btn-outline'}`; }
  });
  catRender();
}

function catFilter(val) {
  _catSearch = val.toLowerCase();
  catRender();
}

function catRender() {
  const grid = document.getElementById('catGrid');
  if(!grid) return;

  if(!_order.company_id) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;padding:32px 0;color:var(--text-muted);font-style:italic">
      Sélectionne une pharmacie pour accéder au catalogue
    </div>`;
    document.getElementById('catProductCount').textContent = '';
    return;
  }

  const visible = _products.filter(p => {
    if(_catSearch) return p.nom.toLowerCase().includes(_catSearch) && p.prix >= 0;
    if(_catTab === 'Normal') return p.type === 'Normal' && p.prix > 0;
    if(_catTab === 'UG')     return p.type === 'UG' || p.type === 'UG échantillon';
    if(_catTab === 'UP')     return p.type === 'UP';
    if(_catTab === 'PLV')    return p.type === 'PLV';
    return p.type === _catTab;
  });

  const tvaDefaultId = (_taxes.find(t => t.value === 5.5) || _taxes[0])?.id || '';
  const countEl = document.getElementById('catProductCount');
  if(countEl) countEl.textContent = visible.length ? `${visible.length} produits` : '';

  grid.innerHTML = visible.map(p => {
    const inCart   = _order.cart[p.id];
    const qty      = inCart?.qty || 0;
    const active   = qty > 0;
    const remise   = inCart?.remise || 0;
    const prixNet  = remise > 0 ? p.prix * (1 - remise/100) : p.prix;
    const lineHT   = active ? prixNet * qty : 0;
    const safeName = p.nom.replace(/'/g,"\\'");
    const isUG     = p.type === 'UG' || p.type === 'UG échantillon';
    const step     = isUG ? 1 : 3;

    const imgUrl = getProductImage(p.nom);
    return `<div id="card_${p.id}" style="
        background:${active?'var(--accent-light)':'var(--surface)'};
        border:2px solid ${active?'var(--accent)':'var(--border)'};
        border-radius:14px;padding:0;overflow:hidden;
        display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(0,0,0,.05)">
      ${imgUrl ? `<div style="background:#fff;height:80px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border)">
        <img src="${imgUrl}" alt="${p.nom}" style="max-height:72px;max-width:100%;object-fit:contain;padding:4px"
             onerror="this.parentElement.style.display='none'">
      </div>` : ''}
      <div style="padding:8px 10px;display:flex;flex-direction:column;gap:6px;flex:1">
      <div>
        <div class="fw6" style="font-size:12px;line-height:1.3">${p.nom}</div>
        <div class="small muted" style="margin-top:1px">${p.prix.toFixed(2)} € HT${p.ean?` · ${p.ean}`:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button onclick="catQty('${p.id}',${-step},${p.prix},'${tvaDefaultId}','${safeName}','${p.type}')"
          style="width:26px;height:26px;border-radius:8px;border:1px solid var(--border);
                 background:var(--surface);cursor:pointer;font-size:15px;font-weight:700;
                 color:var(--text-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0">−</button>
        ${isUG ? `
        <input type="number" min="0" step="1" value="${qty||0}"
          onchange="catSetQty('${p.id}',+this.value,${p.prix},'${tvaDefaultId}','${safeName}','${p.type}')"
          style="width:42px;text-align:center;font-weight:800;font-size:13px;border:1px solid var(--border);
                 border-radius:6px;background:var(--bg-card);color:${active?'var(--accent)':'var(--text-muted)'};padding:2px 4px">
        ` : `
        <span style="min-width:28px;text-align:center;font-weight:800;font-size:14px;
                     color:${active?'var(--accent)':'var(--text-muted)'}">${qty||'·'}</span>
        `}
        <button onclick="catQty('${p.id}',${+step},${p.prix},'${tvaDefaultId}','${safeName}','${p.type}')"
          style="width:26px;height:26px;border-radius:8px;
                 border:1px solid ${active?'var(--accent)':'var(--border)'};
                 background:${active?'var(--accent)':'var(--surface)'};
                 color:${active?'#fff':'var(--text-dim)'};cursor:pointer;font-size:15px;font-weight:700;
                 display:flex;align-items:center;justify-content:center;flex-shrink:0">+</button>
        ${active ? `<span class="fw6 small" style="margin-left:4px;color:var(--accent);flex:1;text-align:right">${fmtEur(lineHT)}</span>` : ''}
      </div>
      ${active && remise > 0 ? `<span style="background:var(--green-bg);color:var(--green);border-radius:6px;padding:2px 6px;font-size:10px;font-weight:700;align-self:flex-start">−${remise}%</span>` : ''}
      </div>
    </div>`;
  }).join('') || '<div class="muted small" style="padding:20px;text-align:center">Aucun produit dans cette catégorie</div>';
}

function catQty(pid, delta, prix, tvaDefaultId, nom, type) {
  if(!_order.cart[pid]) _order.cart[pid] = { id: pid, qty: 0, prix, tva: tvaDefaultId, remise: _order.remise_auto || 0, nom, type: type||'Normal', classification: '' };
  _order.cart[pid].qty = Math.max(0, _order.cart[pid].qty + delta);
  if(_order.cart[pid].qty === 0) delete _order.cart[pid];
  catRender();
  cartRender();
}

function catSetQty(pid, qty, prix, tvaDefaultId, nom, type) {
  const q = Math.max(0, Math.round(+qty));
  if(q === 0) { delete _order.cart[pid]; }
  else {
    if(!_order.cart[pid]) _order.cart[pid] = { id: pid, qty: 0, prix, tva: tvaDefaultId, remise: _order.remise_auto || 0, nom, type: type||'Normal', classification: '' };
    _order.cart[pid].qty = q;
  }
  catRender();
  cartRender();
}

function catSetTva(pid, val) {
  if(_order.cart[pid]) { _order.cart[pid].tva = String(val); cartRender(); }
}

function cartSetClassification(pid, val) {
  if(_order.cart[pid]) _order.cart[pid].classification = val;
}

// ── Panier ─────────────────────────────────────────────────────────────────

function cartRender() {
  const linesEl  = document.getElementById('cartLines');
  const countEl  = document.getElementById('cartCount');
  const totalsEl = document.getElementById('cartTotals');
  if(!linesEl) return;

  const entries = Object.entries(_order.cart);
  if(countEl) {
    countEl.textContent = entries.length || '';
    countEl.style.display = entries.length ? 'inline-flex' : 'none';
  }
  if(totalsEl) totalsEl.style.display = entries.length ? 'block' : 'none';

  if(!entries.length) {
    linesEl.innerHTML = `<div style="text-align:center;padding:20px 12px;color:var(--text-muted)">
      <div style="font-size:22px;margin-bottom:5px">🛒</div>
      <div class="small">Ajoute des produits depuis le catalogue</div>
    </div>`;
    return;
  }

  let ht = 0, ttc = 0;
  const tvaDefaultId = (_taxes.find(t => t.value === 5.5) || _taxes[0])?.id || '';

  const linesHtml = entries.map(([pid, li]) => {
    const taxObj = _taxes.find(t => t.id === li.tva) || { label: '5.5%', value: 5.5 };
    const base = li.prix * li.qty * (1 - (li.remise||0) / 100);
    const ltc  = base * (1 + taxObj.value / 100);
    ht += base; ttc += ltc;
    const tvaOpts = _taxes.map(t =>
      `<option value="${t.id}" ${t.id===li.tva?'selected':''}>${t.label}</option>`
    ).join('');
    return `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:flex-start;gap:6px">
        <div style="flex:1;min-width:0">
          <div class="small fw6" style="line-height:1.3">${li.nom}</div>
          <div class="small muted" style="margin-top:1px">${li.qty} × ${li.prix.toFixed(2)} €${li.remise?` −${li.remise}%`:''}</div>
        </div>
        <span class="fw6 small" style="flex-shrink:0;margin-top:1px">${fmtEur(base)}</span>
        <button onclick="cartRemove('${pid}')" title="Retirer"
          style="background:none;border:none;cursor:pointer;color:var(--text-muted);
                 font-size:16px;line-height:1;flex-shrink:0;padding:0 2px"
          onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-muted)'">×</button>
      </div>
      <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap">
        <select style="padding:2px 6px;border-radius:6px;border:1px solid var(--border);
                       font-size:10px;font-family:inherit;background:var(--bg);color:var(--text-dim)"
          onchange="catSetTva('${pid}',this.value)">${tvaOpts}</select>
        ${(li.type==='UG'||li.type==='UG échantillon'||li.type==='UP') ? `
        <select style="padding:2px 6px;border-radius:6px;border:1px solid var(--amber-border);
                       font-size:10px;font-family:inherit;background:var(--amber-bg);color:var(--amber);font-weight:600"
          onchange="cartSetClassification('${pid}',this.value)" title="Classification UG / UP">
          <option value="" ${!li.classification?'selected':''}>Classification UG/UP…</option>
          <option value="conditions commerciale client"  ${li.classification==='conditions commerciale client'?'selected':''}>Conditions commerciales client</option>
          <option value="test"                           ${li.classification==='test'?'selected':''}>Compensation opé promo</option>
          <option value="offre exceptionnelle sell-in"   ${li.classification==='offre exceptionnelle sell-in'?'selected':''}>Offre exceptionnelle sell-in</option>
          <option value="geste commercial"               ${li.classification==='geste commercial'?'selected':''}>Geste commercial</option>
          <option value="échange périmé"                 ${li.classification==='échange périmé'?'selected':''}>Échange périmé</option>
          <option value="échange déféctueux"             ${li.classification==='échange déféctueux'?'selected':''}>Échange déféctueux</option>
          <option value="litige logistique"              ${li.classification==='litige logistique'?'selected':''}>Litige logistique</option>
          <option value="ne pas renseigner"              ${li.classification==='ne pas renseigner'?'selected':''}>Ne pas renseigner</option>
          <option value="cadeau challenge"               ${li.classification==='cadeau challenge'?'selected':''}>Cadeau challenge</option>
        </select>` : ''}
      </div>
    </div>`;
  }).join('');

  linesEl.innerHTML = linesHtml;
  const elHT  = document.getElementById('orderTotal');
  const elTTC = document.getElementById('orderTotalTTC');
  if(elHT)  elHT.textContent  = fmtEur(ht);
  if(elTTC) elTTC.textContent = fmtEur(ttc);
}

function cartRemove(pid) {
  delete _order.cart[pid];
  catRender();
  cartRender();
}

function _orderFeedback(msg, ok) {
  const el = document.getElementById('orderFeedback');
  if(!el) return;
  el.style.display = 'block';
  el.style.background = ok ? '#d1fae5' : '#fee2e2';
  el.style.color       = ok ? '#065f46' : '#991b1b';
  el.textContent = msg;
}

function orderTypeChange() {
  const t = document.getElementById('orderTypeCommande')?.value;
  const w = document.getElementById('orderRemiseFacWrapper');
  if(w) w.style.display = t === 'Implantation' ? '' : 'none';
  if(t !== 'Implantation') {
    const inp = document.getElementById('orderRemiseFac');
    if(inp) inp.value = '';
  }
}

async function orderSubmit() {
  if(!_order.company_id) { _orderFeedback('Choisissez une pharmacie', false); return; }
  const lines = Object.values(_order.cart).filter(li => li.qty > 0);
  if(!lines.length) { _orderFeedback('Ajoutez au moins un produit', false); return; }

  const note             = document.getElementById('orderNote')?.value || '';
  const type_de_commande = document.getElementById('orderTypeCommande')?.value || 'Réassort';
  const dealstage        = document.getElementById('orderPhase')?.value || '2110945486';
  const closed_won_reason = document.getElementById('orderMotif')?.value || 'Classique';
  const remise_facture   = type_de_commande === 'Implantation'
    ? (parseFloat(document.getElementById('orderRemiseFac')?.value) || 0)
    : 0;
  const btn  = document.getElementById('orderSubmitBtn');
  if(btn) { btn.disabled = true; btn.textContent = 'Conversion…'; }

  try {
    const lineItems = lines.map(li => ({
      ...li,
      tva_id: li.tva,
      remise: remise_facture > 0 ? remise_facture : li.remise,
    }));
    const res = await api('/api/commandes/create', {
      method: 'POST',
      body: JSON.stringify({ company_id: _order.company_id, company_nom: _order.company_nom, line_items: lineItems, note, type_de_commande, dealstage, closed_won_reason }),
    });
    if(res.ok) {
      delete S.cache['commandes'];
      _orderFeedback(`✓ Commande convertie dans HubSpot (${fmtEur(res.montant)} HT)`, true);
      setTimeout(() => navigate('commandes'), 1500);
    } else {
      _orderFeedback('Erreur : ' + (res.error||'inconnue'), false);
      if(btn) { btn.disabled = false; btn.textContent = 'Convertir en commande'; }
    }
  } catch(e) {
    _orderFeedback('Erreur réseau — réessaie', false);
    if(btn) { btn.disabled = false; btn.textContent = 'Convertir en commande'; }
  }
}

// MODULE — OFFRES COMMERCIALES

let _offresData  = null;   // cache local
let _offresEditing = null; // id en cours d'édition (null = création)

async function renderOffres() {
  setContent('<div class="empty">Chargement…</div>');
  try {
    const r    = await fetch('/api/offres');
    const data = await r.json();
    _offresData = data.offres || [];
  } catch(e) {
    setContent(`<div class="empty">Erreur : ${e.message}</div>`);
    return;
  }
  _offresRender();
}

function _offresRender() {
  const offres  = _offresData || [];
  const actives = offres.filter(o => o.statut === 'active');
  const inact   = offres.filter(o => o.statut !== 'active');

  const _card = o => {
    const isActive  = o.statut === 'active';
    const expireSoon = !o.sans_date_limite && o.date_fin && (() => {
      const j = Math.round((new Date(o.date_fin) - Date.now()) / 864e5);
      return j >= 0 && j <= 7;
    })();
    const expired = !o.sans_date_limite && o.date_fin && new Date(o.date_fin) < new Date();

    const typeTag  = o.type_offre === 'sell-out'
      ? '<span class="badge bvp" style="font-size:10px">Sell-out</span>'
      : '<span class="badge bdark" style="font-size:10px">Sell-in</span>';
    const cibleTag = `<span class="badge bamber" style="font-size:10px">${o.cible_offre}</span>`;
    const statTag  = isActive
      ? (expireSoon
          ? '<span class="badge bamber" style="font-size:10px">⚠ Expire bientôt</span>'
          : expired
            ? '<span class="badge bred" style="font-size:10px">Expirée</span>'
            : '<span class="badge bgreen" style="font-size:10px">Active</span>')
      : '<span class="badge bdark" style="font-size:10px;opacity:.6">Inactive</span>';

    const dates = o.sans_date_limite
      ? 'Sans date limite'
      : [o.date_debut && `Début : ${_offreDateFr(o.date_debut)}`,
         o.date_fin   && `Fin : ${_offreDateFr(o.date_fin)}`].filter(Boolean).join(' · ') || '';

    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;opacity:${isActive?1:0.6}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;margin-bottom:4px">${o.nom_offre}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">${typeTag}${cibleTag}${statTag}</div>
          ${o.mecanique ? `<div style="font-size:12px;color:var(--text-muted)">Mécanique : <b>${o.mecanique}</b></div>` : ''}
          ${o.produits  ? `<div style="font-size:12px;color:var(--text-muted)">Produits : ${o.produits}</div>` : ''}
          ${o.message_court ? `<div style="font-size:12px;font-style:italic;margin-top:4px">"${o.message_court}"</div>` : ''}
          ${dates ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px">${dates}</div>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-outline btn-xs" onclick="_offresEdit(${o.id})">Modifier</button>
        <button class="btn btn-ghost btn-xs" onclick="_offresToggle(${o.id})">${isActive?'Désactiver':'Réactiver'}</button>
        <button class="btn btn-ghost btn-xs" style="color:#e74c3c" onclick="_offresDelete(${o.id},'${o.nom_offre.replace(/'/g,"\\'")}')">Supprimer</button>
      </div>
    </div>`;
  };

  setContent(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Offres commerciales</div>
        <div style="font-size:12px;color:var(--text-muted)">${actives.length} active${actives.length>1?'s':''} · ${inact.length} inactive${inact.length>1?'s':''}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="_offresNew()">+ Créer une offre</button>
    </div>

    ${actives.length ? actives.map(_card).join('') : '<div class="inset muted" style="text-align:center;padding:20px">Aucune offre active</div>'}

    ${inact.length ? `
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin:16px 0 8px">
        Inactives (${inact.length})
      </div>
      ${inact.map(_card).join('')}
    ` : ''}
  `);
}

function _offreDateFr(iso) {
  if(!iso) return '';
  try { return new Date(iso).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'}); }
  catch { return iso; }
}

function _offresNew() {
  _offresEditing = null;
  _offresForm({});
}

function _offresEdit(id) {
  const o = (_offresData||[]).find(x => x.id === id);
  if(!o) return;
  _offresEditing = id;
  _offresForm(o);
}

          </div>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="oSansDate" ${chk(o.sans_date_limite)}
              onchange="document.getElementById('oDateFin').disabled=this.checked;if(this.checked)document.getElementById('oDateFin').value=''">
            Pas de date limite
          </label>
        </div>

        <div>
          <div class="label" style="margin-bottom:4px">Statut</div>
          <div style="display:flex;gap:10px">
            <label style="cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px">
              <input type="radio" name="oStatut" value="active" ${o.statut!=='inactive'?'checked':''} style="accent-color:var(--accent)">
              Active
            </label>
            <label style="cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px">
              <input type="radio" name="oStatut" value="inactive" ${o.statut==='inactive'?'checked':''} style="accent-color:var(--accent)">
              Inactive
            </label>
          </div>
        </div>

        <div class="row-sb" style="padding-top:4px">
          <button class="btn btn-ghost" onclick="renderOffres()">Annuler</button>
          <button class="btn btn-primary" onclick="_offresSubmit()">
            ${_offresEditing ? 'Enregistrer les modifications' : 'Créer l\'offre'}
          </button>
        </div>
      </div>
    </div>
  `);
}

async function _offresSubmit() {
  const nom = document.getElementById('oNom')?.value?.trim() || '';
  if(!nom) { alert('Le nom de l\'offre est requis.'); return; }

  const payload = {
    nom_offre:        nom,
    type_offre:       document.getElementById('oType')?.value || 'sell-in',
    cible_offre:      document.getElementById('oCible')?.value || 'client',
    mecanique:        document.getElementById('oMecanique')?.value || '',
    support:          document.getElementById('oSupport')?.value?.trim() || '',
    produits:         document.getElementById('oProduits')?.value?.trim() || '',
    message_court:    document.getElementById('oMessage')?.value?.trim() || '',
    date_debut:       document.getElementById('oDateDebut')?.value || '',
    date_fin:         document.getElementById('oDateFin')?.value || '',
    sans_date_limite: document.getElementById('oSansDate')?.checked || false,
    statut:           document.querySelector('input[name="oStatut"]:checked')?.value || 'active',
  };

  const url    = _offresEditing ? `/api/offres/${_offresEditing}` : '/api/offres';
  const method = _offresEditing ? 'PUT' : 'POST';

  try {
    const r   = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const res = await r.json();
    if(res.ok) {
      _offresData = null; // invalide le cache
      renderOffres();
    } else {
      alert('Erreur : ' + (res.error || 'inconnue'));
    }
  } catch(e) {
    alert('Erreur réseau : ' + e.message);
  }
}

async function _offresToggle(id) {
  try {
    const r   = await fetch(`/api/offres/${id}/toggle`, { method: 'POST' });
    const res = await r.json();
    if(res.ok && res.offre) {
      const idx = (_offresData||[]).findIndex(o => o.id === id);
      if(idx >= 0) _offresData[idx] = res.offre;
      _offresRender();
    }
  } catch(e) { alert('Erreur : ' + e.message); }
}

async function _offresDelete(id, nom) {
  if(!confirm(`Supprimer l'offre "${nom}" ? Cette action est irréversible.`)) return;
  try {
    const r = await fetch(`/api/offres/${id}`, { method: 'DELETE' });
    if(r.ok) {
      _offresData = (_offresData||[]).filter(o => o.id !== id);
      _offresRender();
    }
  } catch(e) { alert('Erreur : ' + e.message); }
}

// MODULE — PORTEFEUILLE
