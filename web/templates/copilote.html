let _pf = { data: null, filter: 'all', sub: 'all', search: '' };

async function renderPortefeuille() {
  if(!_pf.data) {
    setContent('<div class="empty">Chargement du portefeuille… (10–20 s au premier appel)</div>');
    try {
      const r = await api('/api/portefeuille');
      _pf.data = r;
    } catch(e) {
      setContent(`<div class="empty">Erreur : ${e.message}</div>`);
      return;
    }
  }
  _pfRender();
}

function _pfRender() {
  const { data, filter, sub, search } = _pf;
  const pharmacies = data.pharmacies || [];
  const hub_id = data.hub_id || S.hub_id;

  // ── Filtres appliqués ──────────────────────────────────────────────────
  let list = pharmacies;
  if(sub === 'retard')  list = list.filter(p => p.is_retard);
  if(sub === 'proche')  list = list.filter(p => p.is_proche);
  if(sub === 'dn_low')  list = list.filter(p => p.dn_pct !== null && p.dn_pct < 80);
  if(sub === 'reassort') list = list.filter(p => p.last_order_days && p.last_order_days > 60);
  if(search) {
    const q = search.toLowerCase();
    list = list.filter(p => (p.nom||'').toLowerCase().includes(q) || (p.ville||'').toLowerCase().includes(q));
  }

  // ── KPIs résumé ───────────────────────────────────────────────────────
  const all = pharmacies;
  const kpis = [
    { label: 'En retard',        val: all.filter(p => p.is_retard).length,                        cls: 'bred-text' },
    { label: 'DN incomplètes',   val: all.filter(p => p.dn_pct !== null && p.dn_pct < 80).length, cls: 'bamber-text' },
    { label: 'Réassort urgent',  val: all.filter(p => p.last_order_days && p.last_order_days > 60).length, cls: 'bamber-text' },
    { label: 'Cette semaine',    val: all.filter(p => p.is_proche).length,                         cls: '' },
    { label: 'Total clients',    val: all.length, cls: '' },
  ];

  const kpiHtml = `<div class="g4" style="margin-bottom:16px">${kpis.map(k => `
    <div class="inset" style="text-align:center">
      <div class="fw7" style="font-size:22px;color:${k.cls==='bred-text'?'#e74c3c':k.cls==='bamber-text'?'var(--amber)':'var(--accent)'}">${k.val}</div>
      <div class="small muted" style="margin-top:2px">${k.label}</div>
    </div>`).join('')}</div>`;

  // ── Barre de filtres ──────────────────────────────────────────────────
  const _btn = (label, key, active, group) =>
    `<button class="btn btn-sm ${active===key?'btn-primary':'btn-outline'}" onclick="_pfFilter('${group}','${key}')">${label}</button>`;

  const filterBar = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
      <div style="display:flex;gap:4px">
        ${_btn('Retard','retard',sub,'sub')}
        ${_btn('Proche','proche',sub,'sub')}
        ${_btn('DN &lt; 80%','dn_low',sub,'sub')}
        ${_btn('Réassort','reassort',sub,'sub')}
        ${sub!=='all'?`<button class="btn btn-ghost btn-sm" onclick="_pfFilter('sub','all')">✕</button>`:''}
      </div>
      <input type="search" placeholder="Rechercher…" value="${search}"
        oninput="_pf.search=this.value;_pfRender()"
        style="flex:1;min-width:120px;max-width:200px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px">
    </div>`;

  // ── Cartes ────────────────────────────────────────────────────────────
  const VISIBLE = 40;
  const shown   = list.slice(0, VISIBLE);
  const more    = list.length - shown.length;

  const cardsHtml = shown.map(p => _pfCard(p, hub_id)).join('');

  const moreBtn = more > 0
    ? `<div style="text-align:center;padding:12px 0">
        <button class="btn btn-outline" onclick="_pfShowAll()">Voir ${more} de plus</button>
      </div>` : '';

  setContent(`
    ${kpiHtml}
    ${filterBar}
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">${list.length} compte${list.length>1?'s':''} affichés</div>
    <div id="pf-list">${cardsHtml}</div>
    ${moreBtn}
  `);
}

function _pfCard(p, hub_id) {
  const isClient  = p.is_client;
  const urgence   = p.urgence || 'low';
  const borderCol = urgence==='high' ? '#e74c3c' : urgence==='medium' ? 'var(--amber)' : 'var(--border)';

  // Badges
  const badgeType = isClient
    ? '<span class="badge bgreen" style="font-size:10px">Client</span>'
    : '<span class="badge bvp" style="font-size:10px">Prospect</span>';
  const badgePot = p.potentiel === 'Prioritaires'
    ? '<span class="badge bdark" style="font-size:10px">★ Prioritaire</span>' : '';
  const badgeRetard = p.is_retard
    ? '<span class="badge bred" style="font-size:10px">⚠ Retard</span>' : '';
  const badgeProche = p.is_proche
    ? '<span class="badge bamber" style="font-size:10px">Proche</span>' : '';

  // Visite
  const lastVisit = p.last_visit
    ? (() => {
        const d = new Date(p.last_visit);
        const days = Math.round((Date.now()-d)/86400000);
        return `${d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} (${days}j)`;
      })()
    : 'Jamais';

  // Commande
  const lastOrder = p.last_order
    ? (() => {
        const d = new Date(p.last_order);
        return `${d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}${p.last_order_days?' ('+p.last_order_days+'j)':''}`;
      })()
    : '–';

  // DN bar (clients seulement)
  const dnHtml = isClient && p.dn_pct !== null
    ? (() => {
        const pct = p.dn_pct;
        const col = pct>=80 ? 'var(--accent)' : pct>=40 ? 'var(--amber)' : '#e74c3c';
        return `<div style="display:flex;align-items:center;gap:6px;margin-top:6px">
          <div style="font-size:11px;color:var(--text-muted);width:24px">DN</div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--surface2)">
            <div style="height:4px;border-radius:2px;width:${Math.min(pct,100)}%;background:${col}"></div>
          </div>
          <div style="font-size:11px;font-weight:700;color:${col};width:32px">${pct}%</div>
        </div>`;
      })()
    : '';

  // PBA
  const pbaCol = urgence==='high' ? '#e74c3c' : urgence==='medium' ? 'var(--amber)' : 'var(--accent)';
  const pbaHtml = `<div style="margin-top:8px;padding:6px 8px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:space-between">
    <div style="font-size:11px;font-weight:700;color:${pbaCol}">→ ${p.pba}</div>
  </div>`;

  // Métriques
  const ca = p.ca_2026 > 0 ? `CA 2026 : ${_fmt(p.ca_2026)}€` : p.ca_2025 > 0 ? `CA 2025 : ${_fmt(p.ca_2025)}€` : '';
  const remise = p.remise ? `Remise : ${p.remise}` : '';
  const nbCmd = p.nb_cmd ? `${p.nb_cmd} cmd` : '';
  const metaLine = [ca, remise, nbCmd].filter(Boolean).join(' · ');

  // CTAs
  const hsLink = p.id && hub_id
    ? `<a href="https://app.hubspot.com/contacts/${hub_id}/company/${p.id}" target="_blank" class="btn btn-ghost btn-xs">↗ HubSpot</a>` : '';
  const briefBtn = p.id
    ? `<button class="btn btn-outline btn-xs" onclick="navigate('brief',{companyId:'${p.id}',companyNom:${JSON.stringify(p.nom)}})">Brief</button>` : '';
  const cmdBtn = p.id && isClient
    ? `<button class="btn btn-outline btn-xs" onclick="navigate('commandes',{companyId:'${p.id}',companyNom:${JSON.stringify(p.nom)}})">Commande</button>` : '';

  return `<div style="background:var(--surface);border:1px solid ${borderCol};border-radius:10px;padding:12px 14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;line-height:1.2;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.nom||'–'}</div>
        <div style="font-size:11px;color:var(--text-muted)">${[p.ville,p.cp,p.groupement].filter(Boolean).join(' · ')}</div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0">
        ${badgeType}${badgePot}${badgeRetard}${badgeProche}
      </div>
    </div>
    ${dnHtml}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px">
      <div class="inset" style="padding:5px 8px">
        <div class="label" style="font-size:10px">Dernière visite</div>
        <div style="font-size:12px;font-weight:600;margin-top:1px">${lastVisit}</div>
      </div>
      <div class="inset" style="padding:5px 8px">
        <div class="label" style="font-size:10px">Dernière commande</div>
        <div style="font-size:12px;font-weight:600;margin-top:1px">${lastOrder}</div>
      </div>
    </div>
    ${metaLine ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px">${metaLine}</div>` : ''}
    ${pbaHtml}
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      ${briefBtn}${cmdBtn}${hsLink}
    </div>
  </div>`;
}

function _pfFilter(group, key) {
  if(group === 'filter') _pf.filter = key;
  if(group === 'sub') _pf.sub = (_pf.sub === key ? 'all' : key);
  _pfRender();
}

function _pfShowAll() {
  const { data, filter, sub, search, hub_id } = _pf;
  let list = data.pharmacies || [];
  if(sub === 'retard')  list = list.filter(p => p.is_retard);
  if(sub === 'proche')  list = list.filter(p => p.is_proche);
  if(sub === 'dn_low')  list = list.filter(p => p.dn_pct !== null && p.dn_pct < 80);
  if(sub === 'reassort') list = list.filter(p => p.last_order_days && p.last_order_days > 60);
  if(search) { const q=search.toLowerCase(); list=list.filter(p=>(p.nom||'').toLowerCase().includes(q)||(p.ville||'').toLowerCase().includes(q)); }
  const h = data.hub_id || S.hub_id;
  document.getElementById('pf-list').innerHTML += list.slice(40).map(p => _pfCard(p, h)).join('');
  const btn = document.querySelector('#pf-list + div');
  if(btn) btn.remove();
}

function _fmt(n) {
  if(!n) return '0';
  return Math.round(n).toLocaleString('fr-FR');
}

// MODULE — SYNCHRONISATION
// ══════════════════════════════════════
function renderSyncPage() {
  const online  = navigator.onLine;
  const pending = queueGet();

  const pendingHtml = pending.length ? `
    <div class="card" style="margin-top:16px">
      <div class="card-header">
        <div class="card-header-row">
          <div>
            <div class="card-title">En attente de sync</div>
            <div class="card-desc">${pending.length} compte${pending.length>1?'s':''}-rendu${pending.length>1?'s':''} non envoyé${pending.length>1?'s':''}</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="syncPush()" id="syncPushBtn" ${online?'':'disabled'}>
            ${online ? 'Synchroniser maintenant' : 'Hors connexion'}
          </button>
        </div>
      </div>
      <div class="card-body" style="padding-top:0" id="syncPendingList">
        ${pending.map(item => {
          const photoCount = item._photosData ? item._photosData.length : (item._photoData ? 1 : 0);
          const photoTag = photoCount > 0
            ? `<span class="badge bamber" style="font-size:10px;margin-left:4px">📸 ${photoCount} photo${photoCount>1?'s':''}</span>`
            : '';
          return `<div id="syncItem_${item._id}" class="row-sb inset" style="margin-top:8px">
            <div>
              <div class="fw6 small">${item._label || item.company_nom}${photoTag}</div>
              <div class="small muted">${new Date(item._at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})} · ${item.outcome||''}</div>
            </div>
            <button onclick="syncRemoveOne('${item._id}')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px">×</button>
          </div>`;
        }).join('')}
      </div>
    </div>` : `
    <div style="padding:12px 16px;border-radius:12px;background:#d4edda;color:#155724;font-size:12px;font-weight:700;margin-top:16px">
      ✓ Aucun élément en attente — tout est synchronisé
    </div>`;

  setContent(`
    <div class="card">
      <div class="card-header">
        <div class="card-header-row">
          <div><div class="card-title">Synchronisation</div><div class="card-desc">Statut réseau · HubSpot</div></div>
          <button class="btn btn-outline btn-sm" onclick="renderSyncPage()">Actualiser</button>
        </div>
      </div>
      <div class="card-body">
        <div class="${online?'inset-accent':'inset-amber'}" style="margin-bottom:0">
          <div class="fw6">${online ? '✓ Connecté à HubSpot' : '⚡ Hors connexion'}</div>
          <div class="small muted" style="margin-top:4px">${online
            ? 'Les comptes-rendus en attente peuvent être envoyés maintenant.'
            : 'Saisie possible hors ligne. Synchronisation au retour réseau.'}</div>
        </div>
      </div>
    </div>
    ${pendingHtml}`);
}

async function syncPush() {
  const btn = document.getElementById('syncPushBtn');
  if(btn) { btn.disabled = true; btn.textContent = 'Envoi en cours…'; }

  const pending = queueGet();
  let ok = 0, err = 0;

  for(const item of pending) {
    try {
      let fetchOpts;
      if(item._photosData || item._photoData) {
        // Reconstruire les fichiers depuis base64 et envoyer en multipart
        const fd = new FormData();
        ['outcome','company_id','company_nom','note_body','next_date','next_time','next_type','meeting_id']
          .forEach(k => fd.append(k, item[k] || ''));
        if(item._photosData) {
          for(const p of item._photosData) {
            const blob = await fetch(p.data).then(r => r.blob());
            fd.append('photos', blob, p.name || 'photo.jpg');
          }
        } else {
          // legacy single photo
          const blob = await fetch(item._photoData).then(r => r.blob());
          fd.append('photos', blob, item._photoName || 'photo.jpg');
        }
        fetchOpts = { method: 'POST', body: fd };
      } else {
        fetchOpts = {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            outcome: item.outcome, company_id: item.company_id,
            company_nom: item.company_nom, note_body: item.note_body,
            next_date: item.next_date, next_time: item.next_time,
            next_type: item.next_type,
          }),
        };
      }
      const r   = await fetch(`/api/post-rdv/${item.meeting_id}/submit`, fetchOpts);
      const res = await r.json().catch(() => ({}));
      if(r.ok && res.ok) { queueRemove(item._id); ok++; }
      else err++;
    } catch { err++; }
  }

  delete S.cache['post_visite'];
  delete S.cache['today'];

  renderSyncPage();
  if(err > 0) {
    const banner = document.createElement('div');
    banner.style.cssText = 'margin-top:12px;padding:10px 14px;border-radius:10px;background:#fee2e2;color:#991b1b;font-size:12px;font-weight:700';
    banner.textContent = `${ok} envoyé${ok>1?'s':''}, ${err} erreur${err>1?'s':''} — réessaie dans quelques secondes.`;
    document.querySelector('.main-content')?.prepend(banner);
  }
}

function syncRemoveOne(id) {
  if(confirm('Supprimer ce CR de la file d\'attente ? Il ne sera pas envoyé à HubSpot.')) {
    queueRemove(id);
    renderSyncPage();
  }
}

function syncItem(label, state, ok) {
  return `<div class="row-sb inset">
    <div><div class="fw6 small">${label}</div><div class="small muted">${state}</div></div>
    <span class="sync-badge ${ok?'sb-synced':'sb-pending'}">${ok?'À jour':'En attente'}</span>
  </div>`;
}
